    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [msgs, busy, open]);

  // โหลดประวัติแชทของคน ๆ นี้ (ครั้งเดียวเมื่อพร้อม) — เก็บ 30 วันใน Supabase
  useEffect(() => {
    if (!ready || loaded) return;
    let alive = true;
    sb.loadChatHistory(sbCfg)
      .then(h => { if (alive && h && h.length) setMsgs(h); })
      .catch(() => {})
      .finally(() => { if (alive) setLoaded(true); });
    return () => { alive = false; };
  }, [ready]);

  const quicks = [t('chat_q1'), t('chat_q2'), t('chat_q3'), t('chat_q4')];

  function pickFile() { if (fileRef.current) fileRef.current.click(); }
  async function onFile(e) {
    const f = e.target.files && e.target.files[0];
    e.target.value = '';
    if (!f) return;
    if (f.size > 5 * 1024 * 1024) { setMsgs(m => [...m, { role:'assistant', content: t('chat_file_too_big') }]); return; }
    const mime = f.type || '';
    const ext  = (f.name.split('.').pop() || '').toLowerCase();
    const isImg = mime.startsWith('image/') || ['png','jpg','jpeg','webp','gif'].includes(ext);
    const isPdf = mime === 'application/pdf' || ext === 'pdf';
    try {
      if (isImg || isPdf) {
        const data = await new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = () => res(String(r.result).split(',')[1] || '');   // base64 (ตัด data: prefix)
          r.onerror = rej; r.readAsDataURL(f);
        });
        setAttachedFile({ name: f.name, kind: isImg ? 'image' : 'pdf',
          mime: mime || (isPdf ? 'application/pdf' : 'image/png'), data, sizeKB: Math.round(f.size/1024) });
      } else {
        const data = await new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = () => res(String(r.result || '').slice(0, 50000));
          r.onerror = rej; r.readAsText(f);
        });
        setAttachedFile({ name: f.name, kind: 'text', mime: mime || 'text/plain', data, sizeKB: Math.round(f.size/1024) });
      }
    } catch (e2) { setMsgs(m => [...m, { role:'assistant', content: t('chat_error') }]); }
  }

  // D2: ค้นหาไฟล์ใน Drive แล้วแสดงผลในแชท (ใช้ทั้งจากการพิมพ์คำสั่ง และปุ่ม 🔍)
  async function doDriveSearch(driveQ, userMsg) {
    setMsgs(m => [...m, userMsg]);
    setBusy(true);
    try {
      const res = await sb.driveSearch(sbCfg, driveQ);
      let content, drive = null;
      if (res && res.error) {
        content = t('chat_drive_err') + (res.detail || res.message ? ' (' + (res.detail || res.message) + ')' : '');
      } else if (res && res.results === undefined && res.files !== undefined) {
        content = t('chat_drive_oldfn');   // Edge Function ยังเป็นโค้ดเก่า (list-only) ยังไม่มีโหมดค้นหา
      } else {
        const results = (res && res.results) || [];
        if (!results.length) content = t('chat_drive_none', { q: driveQ });
        else { content = t('chat_drive_found', { n: results.length, q: driveQ }); drive = results; }
      }
      setMsgs(m => [...m, { role:'assistant', content, drive }]);
      const histText = content + (drive ? '\n' + drive.map(r => '• ' + r.name + (r.path ? ' — 📁 ' + r.path : '')).join('\n') : '');
      sb.saveChatMessages(sbCfg, [{ role:'user', content: userMsg.content }, { role:'assistant', content: histText }]).catch(() => {});
    } catch (e) {
      setMsgs(m => [...m, { role:'assistant', content: t('chat_drive_err') }]);
    } finally { setBusy(false); }
  }
  // ปุ่ม 🔍 — ค้นข้อความในช่องพิมพ์ใน Drive ทันที (ไม่ต้องมีคำว่า "หาไฟล์")
  function searchDriveBtn() {
    if (busy) return;
    const qq = input.trim();
    if (!qq) { if (inputRef.current) inputRef.current.focus(); return; }   // ยังไม่พิมพ์ → เด้งไปช่องพิมพ์
    setInput('');
    const userMsg = { role:'user', content: qq };
    if (!ready) { setMsgs(m => [...m, userMsg, { role:'assistant', content: t('chat_not_ready') }]); return; }
    doDriveSearch(qq, userMsg);
  }

  async function send(text) {
    const q = (text != null ? text : input).trim();
    const fileToSend = (text == null) ? attachedFile : null;   // chip ด่วนไม่แนบไฟล์
    if ((!q && !fileToSend) || busy) return;
    setInput(''); if (fileToSend) setAttachedFile(null);
    const userMsg = { role:'user', content: q || (lang === 'en' ? '(file attached)' : '(แนบไฟล์)'),
                      file: fileToSend ? fileToSend.name : null };
    if (!ready) {
      setMsgs(m => [...m, userMsg, { role:'assistant', content:t('chat_not_ready') }]);
      return;
    }
    // ── D2: AI ค้นหา Drive — ถ้าข้อความเป็นคำสั่งค้นไฟล์ → ค้นใน Drive แทนการถาม AI ──
    const driveQ = (!fileToSend) ? detectDriveSearch(q) : null;
    if (driveQ) { await doDriveSearch(driveQ, userMsg); return; }
    const next = [...msgs, userMsg];
    setMsgs(next);
    setBusy(true);
    try {
      const payload = {
        messages: next.map(m => ({ role:m.role, content:m.content })),
        persona: { buddy, name: currentUser, role },
        context: buildChatContext(tasks, currentUser, isManager),
        lang,
      };
      if (fileToSend) payload.file = { name: fileToSend.name, kind: fileToSend.kind, mime: fileToSend.mime, data: fileToSend.data };
      const data = await sb.aiChat(sbCfg, payload);
      let reply;
      if (data && data.reply) reply = data.reply;
      else if (data && data.error) reply = t('chat_error')
        + (data.detail ? ('\n\n⚠️ [' + (data.engine || 'AI') + ' ' + (data.status || '') + '] ' + String(data.detail).slice(0, 300))
                       : ('\n\n⚠️ ' + data.error));
      else reply = t('chat_error');
      const eng = data && data.engine;
      setMsgs(m => [...m, { role:'assistant', content: reply, engine: eng }]);
      // บันทึกลง Supabase (เก็บ 30 วัน) — เงียบ ๆ ไม่ขัดจังหวะผู้ใช้
      sb.saveChatMessages(sbCfg, [
        { role:'user', content: userMsg.content },
        { role:'assistant', content: reply, engine: eng },
      ]).catch(() => {});
    } catch (e) {
      setMsgs(m => [...m, { role:'assistant', content: t('chat_error') }]);
    } finally {
      setBusy(false);
    }
  }

  function onKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  }

  if (!open) {
    return (
      <button className="chat-fab" onClick={openPanel} title={t('chat_open')}>
        <AiAvatar name={buddy} size={26} ring={false} /> {buddy}
      </button>
    );
  }

  return (
    <div className="chat-panel">
      <div className="chat-head">
        <AiAvatar name={buddy} size={40} />
        <div style={{ flex:1, minWidth:0 }}>
          <div className="chat-head-name">{buddy}</div>
          <div className="chat-head-sub">{t('chat_title')}{role ? ' • ' + role : ''}</div>
        </div>
        {msgs.length > 0 && <button className="chat-head-btn" title={t('chat_clear')} onClick={() => { setMsgs([]); if (ready) sb.clearChatHistory(sbCfg).catch(()=>{}); }}>🗑</button>}
        <button className="chat-head-btn" title={t('chat_close')} onClick={() => setOpen(false)}>✕</button>
      </div>
      <div className="chat-body" ref={bodyRef}>
        {msgs.length === 0 && (
          <div>
            <div className="chat-intro">{t('chat_hello')} {currentUser} 👋<br />{t('chat_intro')}</div>
            <div className="chat-chips">
              {quicks.map((q, i) => <button key={i} className="chat-chip" onClick={() => send(q)}>{q}</button>)}
            </div>
            <div className="chat-drive-hint">{t('chat_drive_hint')}</div>
          </div>
        )}
        {msgs.map((m, i) => (
          <div key={i} className={'chat-msg ' + (m.role === 'user' ? 'user' : 'ai')}>
            {m.role === 'user' && m.file && <div className="chat-file-chip">📎 {m.file}</div>}
            {m.content}
            {m.role === 'assistant' && m.drive && m.drive.length > 0 && (
              <div className="chat-drive-results">
                {m.drive.map(r => (
                  <div key={r.id} className="chat-drive-item"
                       onClick={() => window.open(r.link, '_blank', 'noopener,noreferrer')}
                       title={t('drive_open_external')}>
                    <DriveFileIcon f={r} />
                    <div className="chat-drive-info">
                      <div className="chat-drive-name">{r.name}</div>
                      <div className="chat-drive-path">📁 {r.path || t('nav_drive')}</div>
                    </div>
                    <div className="chat-drive-open">↗</div>
                  </div>
                ))}
              </div>
            )}
            {m.role === 'assistant' && m.engine && (
              <div className="chat-engine">{m.engine === 'claude' ? '🧠 Claude' : '⚡ Gemini'}</div>
            )}
          </div>
        ))}
        {busy && <div className="chat-typing">{buddy} {t('chat_thinking')}</div>}
      </div>
      <div className="chat-foot">
        {attachedFile && (
          <div className="chat-attach">
            <span className="chat-attach-name">📎 {attachedFile.name} · {attachedFile.sizeKB} KB</span>
            <button className="chat-attach-x" onClick={() => setAttachedFile(null)} title={t('chat_remove_file')}>✕</button>
          </div>
        )}
        <div className="chat-input-row">
          <input type="file" ref={fileRef} style={{ display:'none' }}
            accept=".csv,.txt,.pdf,.png,.jpg,.jpeg,.webp,.gif,image/*,application/pdf,text/*" onChange={onFile} />
          <button className="chat-attach-btn" onClick={pickFile} disabled={busy} title={t('chat_attach')}>📎</button>
          <button className="chat-attach-btn chat-search-btn" onClick={searchDriveBtn} disabled={busy} title={t('chat_drive_btn')}>🔍</button>
          <textarea className="chat-input" ref={inputRef} rows={1} value={input} placeholder={t('chat_placeholder')}
            onChange={e => setInput(e.target.value)} onKeyDown={onKey} />
          <button className="chat-send" disabled={busy || (!input.trim() && !attachedFile)} onClick={() => send()} title={t('chat_send')}>➤</button>
        </div>
        <div className="chat-disclaimer">{t('chat_disclaimer')}</div>
      </div>
    </div>
  );
}

// ─── ชุด C (#5): ฟอร์มส่งงานสาธารณะ (เปิดผ่าน ?form=request — ไม่ต้องล็อกอิน) ─────
function RequestForm({ cfg }) {
  const { t, lang, setLang } = useT();
  const [form, setForm] = useState(() => {
    let me = {};
    try { me = JSON.parse(localStorage.getItem('afflow_req_me') || '{}'); } catch (e) {}
    return { name: me.name || '', contact: me.contact || '', title: '', details: '', category: '', neededBy: '' };
  });
  const [busy, setBusy] = useState(false);
  const [done, setDone] = useState(false);
  const [err,  setErr]  = useState('');
  const remembered = !!(form.name || form.contact);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  async function submit(e) {
    if (e) e.preventDefault();
    setErr('');
    if (!form.name.trim() || !form.title.trim()) { setErr(t('req_required')); return; }
    setBusy(true);
    try {
      const details = form.neededBy
        ? (form.details ? form.details + '\n\n' : '') + '📅 ' + t('req_needed_by') + ': ' + thaiDateFull(form.neededBy, lang)
        : form.details;
      await sb.submitRequest(cfg, { name: form.name, contact: form.contact, title: form.title, details, category: form.category });
      try { localStorage.setItem('afflow_req_me', JSON.stringify({ name: form.name, contact: form.contact })); } catch (e3) {}
      setDone(true);
    } catch (e2) { setErr(t('req_fail')); }
    setBusy(false);
  }
  return (
    <div className="welcome-overlay">
      <div className="welcome-card" style={{ maxWidth: 480 }}>
        <div className="topbar-lang-toggle" style={{ position:'absolute', top:14, right:14 }}
             onClick={() => setLang(lang === 'th' ? 'en' : 'th')} title="TH / EN">
          <span className={`lang-opt${lang === 'th' ? ' active' : ''}`}>TH</span>
          <span className="lang-sep">/</span>
          <span className={`lang-opt${lang === 'en' ? ' active' : ''}`}>EN</span>
        </div>
        <div className="welcome-logo"><img src={COMPANY_LOGO} alt="Hungry Hub" className="welcome-logo-img" /></div>
        <div className="welcome-title" style={{ fontSize:'1.4rem' }}>{t('req_title')}</div>
        <div className="welcome-sub">{t('req_sub')}</div>
        {done ? (
          <div style={{ marginTop:22, textAlign:'center' }}>
            <div style={{ fontSize:'2.6rem' }}>✅</div>
            <div className="welcome-sub" style={{ color:'var(--success)', fontWeight:700, marginTop:8 }}>{t('req_thanks')}</div>
            <button className="welcome-btn" style={{ marginTop:18, width:'100%' }}
              onClick={() => { setForm(f => ({ name: f.name, contact: f.contact, title:'', details:'', category:'', neededBy:'' })); setDone(false); }}>{t('req_again')}</button>
          </div>
        ) : (
        <form onSubmit={submit} style={{ marginTop:16, textAlign:'left' }}>
          <div className="form-group"><label className="form-label">{t('req_name')} *</label>
            <input className="form-input" value={form.name} onChange={e => set('name', e.target.value)} placeholder={t('req_name_ph')} /></div>
          <div className="form-group"><label className="form-label">{t('req_contact')}</label>
            <input className="form-input" value={form.contact} onChange={e => set('contact', e.target.value)} placeholder={t('req_contact_ph')} />
            {remembered && <div style={{ fontSize:'0.72rem', color:'var(--text-muted)', marginTop:5 }}>{t('req_remembered')}</div>}</div>
          <div className="form-group"><label className="form-label">{t('req_what')} *</label>
            <input className="form-input" value={form.title} onChange={e => set('title', e.target.value)} placeholder={t('req_what_ph')} /></div>
          <div className="form-group"><label className="form-label">{t('req_category')}</label>
            <select className="form-input" value={form.category} onChange={e => set('category', e.target.value)}>
              <option value="">{t('req_category_any')}</option>
              {CATEGORIES.map(c => <option key={c} value={c}>{tCat(c, lang)}</option>)}
            </select></div>
          <div className="form-group"><label className="form-label">{t('req_details')}</label>
            <textarea className="form-input" rows={3} value={form.details} onChange={e => set('details', e.target.value)} placeholder={t('req_details_ph')} /></div>
          <div className="form-group"><label className="form-label">{t('req_needed_by')}</label>
            <input className="form-input" type="date" value={form.neededBy} onChange={e => set('neededBy', e.target.value)} /></div>
          {err && <div style={{ color:'var(--danger)', fontSize:'0.82rem', fontWeight:600, marginBottom:10 }}>✕ {err}</div>}
          <button className="welcome-btn" type="submit" disabled={busy} style={{ width:'100%' }}>{busy ? t('req_sending') : t('req_send')}</button>
        </form>
        )}
      </div>
    </div>
  );
}

// ─── ชุด C: กล่อง Inbox (เฉพาะทีม) ────────────────────────────────────────────
function InboxView({ cfg, onConvert }) {
  const { t, lang } = useT();
  const [reqs, setReqs] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [showDone, setShowDone] = useState(false);   // dropdown ประวัติงานที่เสร็จแล้ว
  useEffect(() => {
    let alive = true;
    sb.loadRequests(cfg).then(d => { if (alive) { setReqs(d); setLoaded(true); } }).catch(() => { if (alive) setLoaded(true); });
    const unsub = sb.subscribeRequests(cfg, () => { sb.loadRequests(cfg).then(d => { if (alive) setReqs(d); }).catch(() => {}); });
    return () => { alive = false; if (unsub) unsub(); };
  }, [cfg.url, cfg.key]);
  async function setStatus(id, status) { setReqs(rs => rs.map(r => r.id === id ? { ...r, status } : r)); try { await sb.updateRequestStatus(cfg, id, status); } catch (e) {} }
  async function del(id) { if (!confirm(t('req_del_confirm'))) return; setReqs(rs => rs.filter(r => r.id !== id)); try { await sb.deleteRequest(cfg, id); } catch (e) {} }
  const fmt = (iso) => { try { return new Date(iso).toLocaleString(lang === 'en' ? 'en-GB' : 'th-TH'); } catch (e) { return ''; } };
  const active   = reqs.filter(r => r.status !== 'done');
  const doneReqs = reqs.filter(r => r.status === 'done');
  const newCount = active.length;

  function card(r) {
    const st = r.status === 'done' ? 'done' : (r.status === 'in_progress' ? 'inprogress' : 'new');
    const stTxt = r.status === 'done' ? t('inbox_done') : (r.status === 'in_progress' ? t('inbox_inprogress') : t('inbox_new'));
    return (
      <div key={r.id} className={'inbox-card' + (r.status === 'done' ? ' done' : '')}>
        <div className="inbox-card-head">
          <span className="inbox-from">👤 {r.requester_name}</span>
          <span className="inbox-time">{fmt(r.created_at)}</span>
          <span className={'inbox-status ' + st}>{stTxt}</span>
        </div>
        <div className="inbox-title">{r.title}</div>
        {r.details && <div className="inbox-details">{r.details}</div>}
        {r.requester_contact && <div className="inbox-contact">📞 {r.requester_contact}</div>}
        {r.status === 'in_progress' && <div className="inbox-linked">🔗 {t('inbox_linked')}</div>}
        <div className="inbox-actions">
          {onConvert && r.status === 'new' &&
            <button className="btn btn-primary inbox-btn" onClick={() => onConvert(r)}>➕ {t('inbox_to_task')}</button>}
          {r.status !== 'done'
            ? <button className="btn btn-outline inbox-btn" onClick={() => setStatus(r.id, 'done')}>✅ {t('inbox_mark_done')}</button>
            : <button className="btn btn-outline inbox-btn" onClick={() => setStatus(r.id, 'new')}>↩ {t('inbox_reopen')}</button>}
          <button className="btn btn-outline inbox-btn danger" onClick={() => del(r.id)}>🗑 {t('delete')}</button>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="page-header">
        <div className="page-title">📥 {t('inbox_title')}</div>
        <div className="page-subtitle">{t('inbox_sub', { n: newCount })}</div>
      </div>
      {loaded && reqs.length === 0 && (
        <div className="card"><div className="empty-state"><div className="empty-icon">📭</div><div className="empty-text">{t('inbox_empty')}</div></div></div>
      )}
      {loaded && reqs.length > 0 && active.length === 0 && (
        <div className="inbox-allclear">✅ {t('inbox_all_clear')}</div>
      )}
      {active.map(card)}

      {doneReqs.length > 0 && (
        <div className="inbox-history">
          <button className="inbox-history-toggle" onClick={() => setShowDone(s => !s)}>
            <span className="inbox-history-caret">{showDone ? '▾' : '▸'}</span>
            <span>📋 {t('inbox_history')}</span>
            <span className="inbox-history-count">{doneReqs.length}</span>
          </button>
          {showDone && <div className="inbox-history-list">{doneReqs.map(card)}</div>}
        </div>
      )}
    </div>
  );
}

// ─── หน้าต่างดู Drive กลางในแอป (embedded folder view) ──────────────────────────
function driveIcon(f) {
  if (f.isFolder) return '📁';
  const mt = f.mimeType || '';
  if (mt.includes('spreadsheet') || mt.includes('excel') || mt.includes('csv')) return '📊';
  if (mt.includes('presentation') || mt.includes('powerpoint')) return '📽️';
  if (mt.includes('document') || mt.includes('msword') || mt.includes('wordprocessing')) return '📝';
  if (mt.includes('pdf')) return '📕';
  if (mt.includes('image')) return '🖼️';
  if (mt.includes('video')) return '🎬';
  if (mt.includes('audio')) return '🎵';
  if (mt.includes('zip') || mt.includes('compressed')) return '🗜️';
  return '📄';
}
function fmtDriveDate(iso, lang) {
  try {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    return d.toLocaleDateString(lang === 'th' ? 'th-TH' : 'en-US', { day: 'numeric', month: 'short', year: '2-digit' });
  } catch (e) { return ''; }
}
// ลิงก์ดาวน์โหลดไฟล์จาก Drive (ไฟล์ไบนารีดาวน์โหลดตรง / ไฟล์ Google เปิดดู)
function driveDownloadUrl(f) {
  if (!f || f.isFolder) return null;
  if ((f.mimeType || '').startsWith('application/vnd.google-apps')) return f.link;  // Google Docs/Sheets → เปิดดู (โหลดจากในนั้น)
  return 'https://drive.google.com/uc?export=download&id=' + f.id;
}
function driveDownload(e, f) {
  e.stopPropagation();
  const u = driveDownloadUrl(f);
  if (u) window.open(u, '_blank', 'noopener,noreferrer');
}
// ไอคอนไฟล์: ใช้รูปไอคอนจริงจาก Google Drive (บอกชนิดไฟล์ชัดเจน) — ถ้าโหลดไม่ขึ้นใช้ emoji สำรอง
function DriveFileIcon({ f }) {
  const [err, setErr] = useState(false);
  if (f.isFolder) return <span className="drive-li-emoji">📁</span>;
  if (f.icon && !err) {
    const src = f.icon.replace('/16/', '/48/');
    return <img className="drive-li-icon" src={src} alt="" onError={() => setErr(true)} />;
  }
  return <span className="drive-li-emoji">{driveIcon(f)}</span>;
}
function DriveModal({ cfg, onClose, isManager }) {
  const { t, lang } = useT();
  const m = (DRIVE_URL || '').match(/folders\/([^?/]+)/);
  const rootId = m ? m[1] : '';
  const [stack, setStack] = useState([{ id: rootId, name: t('nav_drive') }]);  // breadcrumb
  const [files, setFiles] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [uploading, setUploading] = useState(false);
  const [dragOver, setDragOver] = useState(false);
  const [uploadMsg, setUploadMsg] = useState('');
  const uploadRef = React.useRef(null);
  const current = stack[stack.length - 1];

  async function load(folderId) {
    setLoading(true); setError('');
    try {
      const res = await sb.driveList(cfg, folderId);
      if (res && res.error) {
        setError(res.message || res.detail || res.error); setFiles([]);
      } else {
        setFiles((res && res.files) || []);
      }
    } catch (e) {
      setError(String((e && e.message) || e)); setFiles([]);
    } finally { setLoading(false); }
  }
  useEffect(() => { if (rootId) load(current.id); }, [current.id]);

  const [searchQ, setSearchQ] = useState('');
  const [results, setResults] = useState(null);     // null = โหมดเปิดดูโฟลเดอร์
  const [searching, setSearching] = useState(false);
  const [searchedFor, setSearchedFor] = useState('');

  async function doSearch() {
    const q = searchQ.trim();
    if (!q || searching) return;
    setSearching(true); setSearchedFor(q);
    try {
      const res = await sb.driveSearch(cfg, q);
      setResults((res && res.results) || []);
    } catch (e) { setResults([]); }
    finally { setSearching(false); }
  }
  function clearSearch() { setResults(null); setSearchQ(''); setSearchedFor(''); }

  const openFolder = (f) => { clearSearch(); setStack(s => [...s, { id: f.id, name: f.name }]); };
  const openFolderFromSearch = (f) => { clearSearch(); setStack([{ id: rootId, name: t('nav_drive') }, { id: f.id, name: f.name }]); };
  const goTo = (idx) => { clearSearch(); setStack(s => s.slice(0, idx + 1)); };
  const openFile = (f) => window.open(f.link, '_blank', 'noopener,noreferrer');

  // อัปโหลดไฟล์ (ลากวาง หรือกดปุ่มเลือก) → ขึ้นโฟลเดอร์ที่เปิดดูอยู่
  async function uploadFiles(fileList) {
    const arr = Array.from(fileList || []);
    if (!arr.length || uploading) return;
    if (results !== null) clearSearch();      // อัปโหลดไปยังโฟลเดอร์ที่กำลังเปิดดู
    const target = current.id;
    setUploading(true); setUploadMsg('');
    let ok = 0, fail = 0;
    for (const file of arr) {
      if (file.size > 15 * 1024 * 1024) { fail++; continue; }   // จำกัด 15MB/ไฟล์
      try { const res = await sb.driveUpload(cfg, target, file); if (res && res.error) fail++; else ok++; }
      catch (e) { fail++; }
    }
    setUploading(false);
    setUploadMsg(t('drive_upload_done', { ok, fail }));
    load(target);
  }
  function onDrop(e) { e.preventDefault(); setDragOver(false); if (e.dataTransfer && e.dataTransfer.files) uploadFiles(e.dataTransfer.files); }

  // ลบไฟล์ (ย้ายลงถังขยะ) — เฉพาะ Big Boss
  async function onDelete(e, f) {
    e.stopPropagation();
    if (!window.confirm(t('drive_delete_confirm', { name: f.name }))) return;
    try {
      const res = await sb.driveDelete(cfg, f.id);
      if (res && res.error) { window.alert(t('drive_delete_fail') + (res.detail ? '\n' + res.detail : '')); return; }
      if (results !== null) setResults(rs => (rs || []).filter(x => x.id !== f.id));
      setFiles(fs => fs.filter(x => x.id !== f.id));
    } catch (e2) { window.alert(t('drive_delete_fail')); }
  }

  return (
    <div className="drive-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="drive-panel">
        <div className="drive-head">
          <div className="drive-head-title">📁 {t('nav_drive')}</div>
          <a className="drive-head-link" href={DRIVE_URL} target="_blank" rel="noopener noreferrer">{t('drive_open_external')} ↗</a>
          <button className="drive-head-close" onClick={onClose} title={t('chat_close')}>✕</button>
        </div>

        <div className="drive-search">
          <span className="drive-search-icon">🔍</span>
          <input className="drive-search-input" value={searchQ} placeholder={t('drive_search_ph')}
                 onChange={e => setSearchQ(e.target.value)}
                 onKeyDown={e => { if (e.key === 'Enter') doSearch(); else if (e.key === 'Escape') clearSearch(); }} />
          {results !== null && <button className="drive-search-x" onClick={clearSearch} title={t('drive_search_clear')}>✕</button>}
          <button className="drive-search-btn" onClick={doSearch} disabled={searching || !searchQ.trim()}>{t('drive_search_go')}</button>
        </div>

        {results === null && (
          <div className="drive-crumb">
            {stack.map((s, i) => (
              <React.Fragment key={s.id + '_' + i}>
                {i > 0 && <span className="drive-crumb-sep">›</span>}
                <button className={'drive-crumb-item' + (i === stack.length - 1 ? ' active' : '')}
                        onClick={() => goTo(i)} disabled={i === stack.length - 1}>
                  {i === 0 ? '🏠 ' : ''}{s.name}
                </button>
              </React.Fragment>
            ))}
            <input type="file" ref={uploadRef} multiple style={{ display: 'none' }}
                   onChange={e => { uploadFiles(e.target.files); e.target.value = ''; }} />
            <button className="drive-upload-btn" onClick={() => uploadRef.current && uploadRef.current.click()} disabled={uploading} title={t('drive_upload')}>
              {uploading ? '⏳' : '⬆'} {t('drive_upload')}
            </button>
            <button className="drive-refresh" onClick={() => load(current.id)} disabled={loading} title={t('drive_refresh')}>↻</button>
          </div>
        )}

        <div className={'drive-body' + (dragOver ? ' drag-over' : '')}
             onDragOver={e => { e.preventDefault(); if (!dragOver) setDragOver(true); }}
             onDragLeave={e => { if (e.currentTarget === e.target) setDragOver(false); }}
             onDrop={onDrop}>
          {dragOver && <div className="drive-drop-overlay">⬆<div>{t('drive_drop_hint')}</div></div>}
          {uploadMsg && <div className="drive-upload-msg" onClick={() => setUploadMsg('')}>{uploadMsg} ✕</div>}
          {!rootId ? (
            <div className="drive-state">{t('drive_no_url')}</div>
          ) : uploading ? (
            <div className="drive-state"><div className="drive-spinner" />{t('drive_uploading')}</div>
          ) : searching ? (
            <div className="drive-state"><div className="drive-spinner" />{t('drive_searching')}</div>
          ) : results !== null ? (
            results.length === 0 ? (
              <div className="drive-state">🔍<div>{t('drive_search_none', { q: searchedFor })}</div></div>
            ) : (
              <div className="drive-list">
                <div className="drive-search-count">{t('drive_search_count', { n: results.length, q: searchedFor })}</div>
                {results.map(f => (
                  <div key={f.id} className={'drive-li' + (f.isFolder ? ' is-folder' : '')}
                       onClick={() => f.isFolder ? openFolderFromSearch(f) : openFile(f)} title={f.name}>
                    <DriveFileIcon f={f} />
                    <div className="drive-li-name">{f.name}</div>
                    <div className="drive-li-meta">📁 {f.path || t('nav_drive')}</div>
                    {!f.isFolder && <button className="drive-dl" onClick={e => driveDownload(e, f)} title={t('drive_download')}>⬇</button>}
                    {isManager && !f.isFolder && <button className="drive-del" onClick={e => onDelete(e, f)} title={t('drive_delete')}>🗑</button>}
                    <div className="drive-li-open">{f.isFolder ? '›' : '↗'}</div>
                  </div>
                ))}
              </div>
            )
          ) : loading ? (
            <div className="drive-state"><div className="drive-spinner" />{t('drive_loading')}</div>
          ) : error ? (
            <div className="drive-state drive-err">
              <div style={{ fontSize: '1.6rem' }}>⚠️</div>
              <div style={{ fontWeight: 600 }}>{t('drive_error')}</div>
              <div className="drive-err-detail">{error}</div>
              <button className="drive-retry" onClick={() => load(current.id)}>{t('drive_retry')}</button>
            </div>
          ) : files.length === 0 ? (
            <div className="drive-state">{t('drive_empty_folder')}</div>
          ) : (
            <div className="drive-list">
              {files.map(f => (
                <div key={f.id} className={'drive-li' + (f.isFolder ? ' is-folder' : '')}
                     onClick={() => f.isFolder ? openFolder(f) : openFile(f)} title={f.name}>
                  <DriveFileIcon f={f} />
                  <div className="drive-li-name">{f.name}</div>
                  {f.modified && <div className="drive-li-meta">{fmtDriveDate(f.modified, lang)}</div>}
                  {!f.isFolder && <button className="drive-dl" onClick={e => driveDownload(e, f)} title={t('drive_download')}>⬇</button>}
                  {isManager && !f.isFolder && <button className="drive-del" onClick={e => onDelete(e, f)} title={t('drive_delete')}>🗑</button>}
                  <div className="drive-li-open">{f.isFolder ? '›' : '↗'}</div>
                </div>
              ))}
            </div>
          )}
        </div>

        <div className="drive-foot">{t('drive_hint')}</div>
      </div>
    </div>
  );
}

// ─── Phase 5.3: แชทกลุ่มทีม (ห้องเดียว เรียลไทม์ + แนบไฟล์) ─────────────────────
const TEAM_EMOJIS = [
  '😀','😁','😂','🤣','😊','😍','😎',
  '🥳','😘','🤔','😅','😇','🙂','😉',
  '😭','😢','😡','😴','🤩','🥺','😬',
  '👍','👎','👌','🙏','👏','🙌','💪',
  '✅','❌','⭐','🔥','💯','🎉','✨',
  '❤️','💚','💙','💛','📌','💰','☕',
];
function TeamChat({ sbCfg, currentUser, ready }) {
  const { t } = useT();
  const [open,  setOpen]  = useState(false);
  const [msgs,  setMsgs]  = useState([]);
  const [input, setInput] = useState('');
  const [busy,  setBusy]  = useState(false);
  const [file,  setFile]  = useState(null);    // File object ที่จะส่ง
  const [unread, setUnread] = useState(0);
  const [emojiOpen, setEmojiOpen] = useState(false);
  const bodyRef = React.useRef(null);
  const fileRef = React.useRef(null);
  const openRef = React.useRef(false);
  const emojiRef = React.useRef(null);
  React.useEffect(() => { openRef.current = open; }, [open]);
  // เปิดแชททีม → แจ้งให้แชท AI ปิด (กันหน้าต่างทับกัน)
  function openPanel() { setOpen(true); window.dispatchEvent(new CustomEvent('afflow-panel-open', { detail: 'team' })); }
  React.useEffect(() => {
    const h = (e) => { if (e.detail !== 'team') setOpen(false); };
    window.addEventListener('afflow-panel-open', h);
    return () => window.removeEventListener('afflow-panel-open', h);
  }, []);
  // ปิดแผงอิโมจิเมื่อคลิกนอกแผง
  React.useEffect(() => {
    if (!emojiOpen) return;
    const h = (e) => { if (emojiRef.current && !emojiRef.current.contains(e.target)) setEmojiOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, [emojiOpen]);
  const addEmoji = (em) => setInput(v => v + em);

  useEffect(() => {
    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [msgs, open]);

  // โหลดข้อความเก่า + ฟังเรียลไทม์
  useEffect(() => {
    if (!ready) return;
    let alive = true;
    sb.loadTeamMessages(sbCfg).then(d => { if (alive) setMsgs(d); }).catch(() => {});
    const unsub = sb.subscribeTeam(sbCfg, (m) => {
      if (!alive) return;
      setMsgs(prev => prev.some(x => x.id === m.id) ? prev : [...prev, m]);
      if (!openRef.current && m.sender_name !== currentUser) setUnread(u => u + 1);
    });
    return () => { alive = false; if (unsub) unsub(); };
  }, [ready, sbCfg.url, sbCfg.key]);

  useEffect(() => { if (open) setUnread(0); }, [open]);

  function pickFile() { if (fileRef.current) fileRef.current.click(); }
  function onFile(e) {
    const f = e.target.files && e.target.files[0];
    e.target.value = '';
    if (!f) return;
    if (f.size > 10 * 1024 * 1024) { alert(t('teamchat_file_big')); return; }
    setFile(f);
  }

  async function send() {
    const text = input.trim();
    if ((!text && !file) || busy || !ready) return;
    setBusy(true); setInput('');
    const theFile = file; setFile(null);
    try {
      let filePath = null, fileName = null;
      if (theFile) { const up = await sb.uploadChatFile(sbCfg, theFile); filePath = up.path; fileName = up.name; }
      await sb.sendTeamMessage(sbCfg, { senderName: currentUser, content: text, filePath, fileName });
    } catch (e) { alert(t('teamchat_send_fail')); setInput(text); }
    setBusy(false);
  }

  async function openFile(path) {
    try { const url = await sb.signedFileUrl(sbCfg, path); if (url) window.open(url, '_blank'); } catch (e) {}
  }

  function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }

  if (!ready) return null;

  if (!open) {
    return (
      <button className="team-fab" onClick={openPanel} title={t('teamchat_open')}>
        <span className="chat-fab-emoji">👥</span> {t('teamchat')}
        {unread > 0 && <span className="team-unread">{unread > 9 ? '9+' : unread}</span>}
      </button>
    );
  }

  return (
    <div className="chat-panel team-panel">
      <div className="chat-head team-head">
        <div style={{ flex:1, minWidth:0 }}>
          <div className="chat-head-name">👥 {t('teamchat')}</div>
          <div className="chat-head-sub">{t('teamchat_sub')}</div>
        </div>
        <button className="chat-head-btn" title={t('chat_close')} onClick={() => setOpen(false)}>✕</button>
      </div>
      <div className="chat-body" ref={bodyRef}>
        {msgs.length === 0 && <div className="chat-intro">{t('teamchat_empty')}</div>}
        {msgs.map(m => {
          const mine = m.sender_name === currentUser;
          return (
            <div key={m.id} className={'team-msg ' + (mine ? 'mine' : 'other')}>
              {!mine && (
                <div className="team-msg-sender" style={{ color: getUserColor(m.sender_name) }}>
                  <span className="avatar avatar-sm" style={{ background: getUserColor(m.sender_name) }}>{initials(m.sender_name)}</span>
                  {m.sender_name}
                </div>
              )}
              <div className="team-bubble" style={mine ? null : { borderLeft: '3px solid ' + getUserColor(m.sender_name) }}>
                {m.content && <div style={{ whiteSpace:'pre-wrap' }}>{m.content}</div>}
                {m.file_path && <div className="team-file" onClick={() => openFile(m.file_path)}>📎 {m.file_name || 'file'}</div>}
              </div>
            </div>
          );
        })}
      </div>
      <div className="chat-foot">
        {file && (
          <div className="chat-attach">
            <span className="chat-attach-name">📎 {file.name}</span>
            <button className="chat-attach-x" onClick={() => setFile(null)} title={t('chat_remove_file')}>✕</button>
          </div>
        )}
        <div className="chat-input-row">
          <input type="file" ref={fileRef} style={{ display:'none' }} onChange={onFile} />
          <div className="emoji-wrap" ref={emojiRef}>
            <button className="chat-attach-btn" onClick={() => setEmojiOpen(o => !o)} disabled={busy} title={t('chat_emoji')}>😊</button>
            {emojiOpen && (
              <div className="emoji-panel">
                {TEAM_EMOJIS.map(em => (
                  <button key={em} type="button" className="emoji-cell" onClick={() => addEmoji(em)}>{em}</button>
                ))}
              </div>
            )}
          </div>
          <button className="chat-attach-btn" onClick={pickFile} disabled={busy} title={t('chat_attach')}>📎</button>
          <textarea className="chat-input" rows={1} value={input} placeholder={t('teamchat_placeholder')}
            onChange={e => setInput(e.target.value)} onKeyDown={onKey} />
          <button className="chat-send" disabled={busy || (!input.trim() && !file)} onClick={send} title={t('chat_send')}>➤</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tasks,        setTasks]        = useState(() => loadTasks());
  const [currentUser,  setCurrentUser]  = useState(() => loadUser());
  const [view,         setView]         = useState(() => localStorage.getItem('afflow_view') || 'dashboard');
  const [selectedTask, setSelectedTask] = useState(null);
  const [editingTask,  setEditingTask]  = useState(null);
  const [deletingTask, setDeletingTask] = useState(null);
  const [createOpen,   setCreateOpen]   = useState(false);
  const [convertReq,   setConvertReq]   = useState(null);   // คำขอจาก Inbox ที่กำลังแปลงเป็นงาน
  const [duplicateSrc, setDuplicateSrc] = useState(null);   // งานต้นฉบับที่กำลังทำซ้ำ
  const [commentNotifs, setCommentNotifs] = useState([]);   // #1: แจ้งเตือนคอมเมนต์ใหม่ในงานของฉัน
  const [autoBackup,   setAutoBackup]   = useState(() => localStorage.getItem('afflow_autobackup') !== 'off');
  const [lastBackup,   setLastBackup]   = useState(() => localStorage.getItem('afflow_last_backup') || '');
  const tasksRef = React.useRef(tasks);
  useEffect(() => { tasksRef.current = tasks; }, [tasks]);
  const [darkMode,     setDarkMode]     = useState(() => localStorage.getItem('afflow_dark') === 'true');
  const [search,       setSearch]       = useState('');
  const [sidebarOpen,  setSidebarOpen]  = useState(false);
  const [lang,         setLang]         = useState(() => loadLang());
  const [sbCfg,        setSbCfg]        = useState(() => loadSbCfg());        // { url, key } (Supabase)
  const [session,      setSession]      = useState(undefined);               // undefined=loading | null=logged out | object
  const [profile,      setProfile]      = useState(null);                    // { id, name, role, email }
  const [recovery,     setRecovery]     = useState(false);                   // โหมดตั้งรหัสใหม่จากลิงก์อีเมล
  const [backendStatus,setBackendStatus]= useState('local');                 // local | online | offline | syncing
  const [settingsOpen, setSettingsOpen] = useState(false);

  const isSb     = sbConfigured(sbCfg);
  const isAuthed = isSb && !!session;

  useEffect(() => { saveTasks(tasks); }, [tasks]);   // localStorage = offline cache
  useEffect(() => { if (currentUser) saveUser(currentUser); }, [currentUser]);
  useEffect(() => { localStorage.setItem('afflow_view', view); }, [view]);
  useEffect(() => { localStorage.setItem('afflow_lang', lang); }, [lang]);
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
    localStorage.setItem('afflow_dark', darkMode);
  }, [darkMode]);

  // ── Phase 3: Supabase auth — เช็ค session + ฟังการเปลี่ยนแปลง ────────────────
  useEffect(() => {
    if (!isSb) { setSession(null); setProfile(null); setBackendStatus('local'); return; }
    const c = getSb(sbCfg);
    if (!c) { setSession(null); setBackendStatus('offline'); return; }
    let alive = true;
    c.auth.getSession().then(({ data }) => { if (alive) setSession(data.session || null); })
                       .catch(() => { if (alive) setSession(null); });
    const { data: sub } = c.auth.onAuthStateChange((_e, s) => {
      if (!alive) return;
      if (_e === 'PASSWORD_RECOVERY') setRecovery(true);   // มาจากลิงก์รีเซ็ตในอีเมล
      setSession(s || null);
    });
    return () => { alive = false; if (sub && sub.subscription) sub.subscription.unsubscribe(); };
  }, [sbCfg.url, sbCfg.key]);

  // เมื่อมี session → ดึง profile เพื่อรู้ว่าเป็นใครในทีม (ตั้ง currentUser)
  useEffect(() => {
    if (!isSb || !session) return;
    let alive = true;
    sb.getProfile(sbCfg, session.user.id)
      .then(p => { if (!alive) return; setProfile(p); if (p && p.name) setCurrentUser(p.name); })
      .catch(() => {});
    return () => { alive = false; };
  }, [session && session.user && session.user.id]);

  // ── Phase 3: โหลดงานจาก Supabase + realtime (อัปเดตทุกเครื่องทันที) ───────────
  useEffect(() => {
    if (!isSb || !session) return;
    let alive = true;
    async function load() {
      try {
        setBackendStatus(s => (s === 'online' ? 'online' : 'syncing'));
        const list = await sb.listTasks(sbCfg);
        if (!alive) return;
        detectNewComments(list);   // #1: แจ้งคอมเมนต์ใหม่ในงานของฉัน (จับได้แม้คอมเมนต์เข้ามาตอนปิดแอป)
        setTasks(list);
        setBackendStatus('online');
      } catch (e) { if (alive) setBackendStatus('offline'); }
    }
    load();
    const c = getSb(sbCfg);
    let channel = null;
    if (c) {
      channel = c.channel('afflow-tasks-' + Math.floor(Math.random() * 1e9))
        .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, () => { load(); })
        .subscribe();
    }
    return () => { alive = false; if (c && channel) c.removeChannel(channel); };
  }, [session && session.user && session.user.id, sbCfg.url, sbCfg.key]);

  // push แบบ best-effort (optimistic — อัปเดตหน้าจอก่อน แล้วค่อยส่งขึ้น Supabase)
  function pushUpsert(task) {
    if (!isAuthed) return;
    setBackendStatus('syncing');
    sb.upsertTask(sbCfg, task)
      .then(() => setBackendStatus('online'))
      .catch((err) => {
        setBackendStatus('offline');
        // เด้ง error ให้เห็น (เช่น คอลัมน์ recurrence/request_id ยังไม่ได้สร้าง → งานทำซ้ำ save ไม่ขึ้น)
        const msg = (err && (err.message || err.hint || err.details)) ? String(err.message || err.hint || err.details).slice(0, 150) : '';
        pushToast('⚠️ ' + tApp('save_failed') + (msg ? ': ' + msg : ''));
      });
  }
  function pushDelete(id) {
    if (!isAuthed) return;
    setBackendStatus('syncing');
    sb.deleteTask(sbCfg, id)
      .then(() => setBackendStatus('online'))
      .catch(() => setBackendStatus('offline'));
  }
  function handleSaveSettings(cfg) {
    saveSbCfg(cfg);
    setSbCfg(cfg);
    setSettingsOpen(false);
  }
  function handleLogout() {
    const c = getSb(sbCfg);
    if (c) c.auth.signOut().catch(() => {});
    setProfile(null);
    setSession(null);
    setCurrentUser('');
  }

  // ค้นหาจาก Topbar → กรองงานจริง + สลับไปหน้างานทั้งหมดอัตโนมัติ
  function handleSearch(v) {
    setSearch(v);
    if (v.trim() && view !== 'tasks') setView('tasks');
  }
  function goView(v) {
    setView(v);
    setSidebarOpen(false);
  }

  function updateTask(updated) {
    const prevTask = tasks.find(x => x.id === updated.id);
    setTasks(ts => ts.map(t => t.id === updated.id ? updated : t));
    setSelectedTask(prev => prev && prev.id === updated.id ? updated : prev);
    pushUpsert(updated);
    // ผูกกับคำขอใน Inbox: งานเสร็จ → คำขอ "เสร็จแล้ว", ยังไม่เสร็จ → "กำลังทำ"
    if (updated.requestId && isAuthed) {
      sb.updateRequestStatus(sbCfg, updated.requestId, updated.status === 'done' ? 'done' : 'in_progress').catch(() => {});
    }
    // งานประจำ: เพิ่งเปลี่ยนเป็น "เสร็จแล้ว" → สร้างงานรอบถัดไปอัตโนมัติ
    const justDone = prevTask && prevTask.status !== 'done' && updated.status === 'done';
    if (justDone && updated.recurrence && updated.recurrence !== 'none') {
      spawnNextRecurrence(updated);
    }
  }

  // คำนวณกำหนดส่งรอบถัดไปตามความถี่
  function nextDeadline(iso, rec) {
    const base = iso && /^\d{4}-\d{2}-\d{2}/.test(iso) ? iso : TODAY;
    const d = new Date(base + 'T00:00:00');
    if (rec === 'daily')          d.setDate(d.getDate() + 1);
    else if (rec === 'weekly')    d.setDate(d.getDate() + 7);
    else if (rec === 'monthly')   d.setMonth(d.getMonth() + 1);
    else if (rec === 'quarterly') d.setMonth(d.getMonth() + 3);
    else if (rec === 'yearly')    d.setFullYear(d.getFullYear() + 1);
    const off = new Date(d.getTime() - d.getTimezoneOffset() * 60000);
    return off.toISOString().slice(0, 10);
  }
  function spawnNextRecurrence(task) {
    const taxRec = parseTaxRec(task.recurrence);
    const nd = taxRec
      ? nextTaxDeadlineAfter(task.deadline, taxRec.form, taxRec.efile, TODAY)
      : nextDeadline(task.deadline, task.recurrence);
    const nt = {
      ...task, id: uid(), status: 'pending', deadline: nd,
      createdAt: nowISO(), createdBy: currentUser, comments: [], requestId: undefined,
    };
    setTasks(ts => [...ts, nt]);
    pushUpsert(nt);
    pushToast((taxRec ? '📅 ' : '🔁 ') + tApp('recur_spawned').replace('{date}', thaiDateFull(nd, lang)));
  }

  // ── ชุด B (#3): สถานะออนไลน์ทีม (Realtime Presence) + แจ้งเตือนเมื่อมีคนเข้า ──────
  const [onlineUsers, setOnlineUsers] = useState([]);
  const [toasts, setToasts] = useState([]);
  function pushToast(text) {
    const id = Date.now() + '-' + Math.random();
    setToasts(ts => [...ts, { id, text }]);
    setTimeout(() => setToasts(ts => ts.filter(x => x.id !== id)), 4000);
  }

  // #1: แจ้งเตือนคอมเมนต์ในงานของฉัน (เจ้าของ/ผู้รับผิดชอบ) — จับคอมเมนต์ที่ "ยังไม่เคยเห็น"
  // ครบทุกกรณี: เด้งสด (realtime) + คอมเมนต์ที่เข้ามาตอนปิดแอป (แจ้งตอนเปิด) + ไม่แจ้งคอมเมนต์ของตัวเอง
  function detectNewComments(list) {
    if (!currentUser) return;
    const KEY = 'afflow_seen_cmts_' + currentUser;
    let raw = null;
    try { raw = localStorage.getItem(KEY); } catch (e) {}
    const isBaseline = (raw === null);   // ครั้งแรกสุดของบัญชีนี้ = ตั้งฐาน (ไม่แจ้งย้อนหลัง)
    const seen = new Set((raw || '').split(',').filter(Boolean));
    const toNotify = [];
    (list || []).forEach(t => {
      const isMine = t.assignee === currentUser || t.createdBy === currentUser;
      if (!isMine) return;
      (t.comments || []).forEach(c => {
        const cid = c.id || (t.id + '_' + (c.createdAt || ''));
        if (seen.has(cid)) return;
        seen.add(cid);
        if (c.author && c.author !== currentUser && !isBaseline) toNotify.push({ task: t, comment: c });
      });
    });
    try { localStorage.setItem(KEY, Array.from(seen).slice(-800).join(',')); } catch (e) {}
    toNotify.forEach(x => addCommentNotif(x.task, x.comment));
  }
  function addCommentNotif(task, comment) {
    const nid = (comment.id || (task.id + '_' + (comment.createdAt || nowISO())));
    setCommentNotifs(list => {
      if (list.some(x => x.id === nid)) return list;
      return [{ id: nid, taskId: task.id, taskTitle: task.title, author: comment.author, text: comment.text || '', at: comment.createdAt || nowISO() }, ...list].slice(0, 30);
    });
    pushToast('💬 ' + comment.author + ' ' + tApp('cmt_notif_toast'));
    if ('Notification' in window && Notification.permission === 'granted') {
      try {
        const n = new Notification('💬 ' + comment.author + ' ' + tApp('cmt_notif_title'), {
          body: '📋 ' + task.title + (comment.text ? '\n' + comment.text : ''),
          icon: 'icon-192.png', tag: 'afflow-cmt-' + task.id,
        });
        n.onclick = () => { try { window.focus(); } catch (e) {} handleSelectTask(task); n.close(); };
      } catch (e) {}
    }
  }
  // คลิกแจ้งเตือนคอมเมนต์ → เปิดงานนั้น + เอาแจ้งเตือนออก
  function openCommentNotif(notif) {
    const task = (tasksRef.current || []).find(x => x.id === notif.taskId);
    if (task) handleSelectTask(task);
    setCommentNotifs(list => list.filter(x => x.id !== notif.id));
  }
  useEffect(() => {
    if (!isAuthed || !currentUser) { setOnlineUsers([]); return; }
    let ready = false;
    const timer = setTimeout(() => { ready = true; }, 2500);   // กัน toast ตอนเพิ่งเข้า (คนที่ออนไลน์อยู่แล้ว)
    const unsub = sb.joinPresence(sbCfg, currentUser, {
      onSync: (names) => setOnlineUsers(names),
      onJoin: (name) => { if (ready && name && name !== currentUser) pushToast('🟢 ' + name + ' ' + tApp('presence_online')); },
    });
    return () => { clearTimeout(timer); if (unsub) unsub(); setOnlineUsers([]); };
  }, [isAuthed, currentUser, sbCfg.url, sbCfg.key]);

  // ── ชุด C (#5): ฟอร์มส่งงานสาธารณะ + นับคำขอใหม่ (badge บนเมนู Inbox) ──────────
  const requestMode = /[?&]form=request/.test(typeof window !== 'undefined' ? window.location.search : '');
  const [newReqCount, setNewReqCount] = useState(0);
  const [driveOpen, setDriveOpen] = useState(false);   // หน้าต่างดู Drive ในแอป
  useEffect(() => {
    if (!isAuthed) { setNewReqCount(0); return; }
    let alive = true;
    const load = () => sb.loadRequests(sbCfg).then(d => { if (alive) setNewReqCount((d || []).filter(r => r.status !== 'done').length); }).catch(() => {});
    load();
    const unsub = sb.subscribeRequests(sbCfg, load);
    return () => { alive = false; if (unsub) unsub(); };
  }, [isAuthed, sbCfg.url, sbCfg.key]);

  function handleCreate(form) {
    const t = {
      id: uid(), title: form.title, description: form.description,
      assignee: form.assignee, category: form.category,
      priority: form.priority, deadline: form.deadline, status: form.status,
      recurrence: form.recurrence || 'none',
      createdAt: nowISO(), createdBy: currentUser, comments: [],
      requestId: convertReq ? convertReq.id : undefined,   // ผูกกับคำขอใน Inbox
    };
    setTasks(ts => [...ts, t]);
    pushUpsert(t);
    pushToast('✓ ' + tApp('task_created') + (t.assignee && t.assignee !== currentUser ? ' — ' + tApp('assigned_to') + ' ' + t.assignee : ''));
    // ถ้าสร้างจากคำขอ → ตั้งคำขอเป็น "กำลังทำ" (รอจนกว่างานจะเสร็จค่อยปิดเอง)
    if (convertReq) { sb.updateRequestStatus(sbCfg, convertReq.id, 'in_progress').catch(() => {}); setConvertReq(null); }
    setCreateOpen(false);
  }

  // แปลงคำขอใน Inbox → เปิดหน้าสร้างงานพร้อมข้อมูลที่กรอกให้แล้ว
  function handleConvertRequest(req) {
    setConvertReq(req);
    setView('tasks');
    setCreateOpen(true);
  }
  // ทำซ้ำงาน → เปิดหน้าสร้างงานที่ก๊อปข้อมูลมาให้ (เหลือแค่ใส่วันที่/แก้หัวข้อ)
  function handleDuplicate(task) {
    setDuplicateSrc(task);
    setView('tasks');
    setCreateOpen(true);
  }

  // สำรองข้อมูลทั้งหมดขึ้น Google Drive (ใช้ข้อมูลล่าสุดจาก ref)
  async function handleBackup() {
    const tk = tasksRef.current || tasks;
    if (!tk.length) throw new Error('no_data');
    const [requests, teamMessages] = await Promise.all([
      sb.loadRequests(sbCfg).catch(() => []),
      sb.loadTeamMessages(sbCfg).catch(() => []),
    ]);
    const res = await sb.backupToDrive(sbCfg, { tasks: tk, requests, teamMessages });
    if (res && res.error) throw new Error(res.message || res.detail || res.error);
    const now = nowISO();
    setLastBackup(now);
    try { localStorage.setItem('afflow_last_backup', now); } catch (e) {}
    return res;
  }
  function toggleAutoBackup(on) {
    setAutoBackup(on);
    try { localStorage.setItem('afflow_autobackup', on ? 'on' : 'off'); } catch (e) {}
  }
  // สำรองอัตโนมัติ: หัวหน้าเปิดแอป + เปิด auto + ครั้งล่าสุดเกิน 24 ชม. → สำรองเงียบ ๆ
  useEffect(() => {
    if (!isAuthed || !isManager || !autoBackup) return;
    const last = lastBackup ? new Date(lastBackup).getTime() : 0;
    if (Date.now() - last < 24 * 3600 * 1000) return;
    const id = setTimeout(() => {
      if ((tasksRef.current || []).length) handleBackup().catch(() => {});
    }, 6000);   // รอให้ข้อมูลโหลดเสร็จก่อน
    return () => clearTimeout(id);
  }, [isAuthed, isManager, autoBackup]);

  // แจ้งเตือนบนเครื่อง (OS) — งานใกล้ครบกำหนด/เกินกำหนด (กันซ้ำต่อวัน)
  function notifyDueSoon() {
    if (!('Notification' in window) || Notification.permission !== 'granted' || !currentUser) return;
    const all = tasksRef.current || tasks;
    const scope = isManager ? all : all.filter(t => t.assignee === currentUser);
    const due = scope.filter(t => t.status !== 'done' && daysDiff(t.deadline) <= 1);   // ครบใน 1 วัน หรือเกินกำหนด
    if (!due.length) return;
    const key = 'afflow_notified_' + TODAY;
    let notified;
    try { notified = new Set((localStorage.getItem(key) || '').split(',').filter(Boolean)); } catch (e) { notified = new Set(); }
    const th = lang !== 'en';
    let fired = 0;
    due.forEach(t => {
      if (notified.has(t.id)) return;
      const dd = daysDiff(t.deadline);
      const when = dd < 0 ? (th ? 'เกินกำหนด ' + Math.abs(dd) + ' วัน' : Math.abs(dd) + ' days overdue')
        : dd === 0 ? (th ? 'ครบกำหนดวันนี้' : 'Due today')
        : (th ? 'ครบกำหนดพรุ่งนี้' : 'Due tomorrow');
      try {
        new Notification(th ? 'AFFlow — งานใกล้ครบกำหนด' : 'AFFlow — Task due soon', {
          body: '📋 ' + t.title + '\n' + when + (isManager ? ' • ' + t.assignee : ''),
          icon: 'icon-192.png', badge: 'icon-192.png', tag: 'afflow-' + t.id,
        });
        fired++;
      } catch (e) {}
      notified.add(t.id);
    });
    if (fired) { try { localStorage.setItem(key, Array.from(notified).join(',')); } catch (e) {} }
  }
  useEffect(() => {
    if (!currentUser) return;
    const t0 = setTimeout(notifyDueSoon, 5000);             // หลังโหลดเสร็จ
    const iv = setInterval(notifyDueSoon, 30 * 60 * 1000);  // ทุก 30 นาที
    return () => { clearTimeout(t0); clearInterval(iv); };
  }, [currentUser, isManager]);

  function handleEditSave(form) {
    updateTask({ ...editingTask, ...form });
    setEditingTask(null);
  }

  function handleDeleteConfirm() {
    setTasks(ts => ts.filter(t => t.id !== deletingTask.id));
    if (selectedTask && selectedTask.id === deletingTask.id) setSelectedTask(null);
    pushDelete(deletingTask.id);
    setDeletingTask(null);
  }

  function handleUserChange(u) {
    setCurrentUser(u);
    setView('dashboard');
    setSelectedTask(null);
    setSearch('');
    setSidebarOpen(false);
  }

  const isManager = currentUser === 'Big Boss';
  // #2 โหมดส่วนตัว (เฉพาะหัวหน้า) — กดซ่อนงานตัวเองตอนโชว์ลูกน้อง
  const [privacyMode, setPrivacyMode] = useState(() => localStorage.getItem('afflow_privacy') === 'true');
  useEffect(() => { localStorage.setItem('afflow_privacy', privacyMode ? 'true' : 'false'); }, [privacyMode]);
  // #1: พนักงานไม่เห็นงานหัวหน้า (RLS กันที่ DB อีกชั้น)
  // #2: เปิดโหมดส่วนตัว → งานหัวหน้ากลายเป็น 🔒 ●●●●●●● (กดดูไม่ได้)
  const visibleTasks = React.useMemo(() => {
    if (!isManager) return tasks.filter(t => t.assignee !== 'Big Boss');
    if (privacyMode) return tasks.map(t => t.assignee === 'Big Boss'
      ? { ...t, title: '🔒 ●●●●●●●', description: '', _masked: true } : t);
    return tasks;
  }, [tasks, isManager, privacyMode]);
  const handleSelectTask = (task) => { if (task && task._masked) return; setSelectedTask(task); };

  // local translator (App is the LangContext provider, so it can't use useT())
  const tApp = (k) => (I18N[lang] && I18N[lang][k] != null) ? I18N[lang][k]
                    : (I18N.th[k] != null ? I18N.th[k] : k);

  const NAV = [
    { id: 'dashboard', label: tApp('nav_dashboard'), icon: '📊' },
    { id: 'inbox',     label: tApp('nav_inbox'),     icon: '📥' },
    { id: 'tasks',     label: tApp('nav_tasks'),     icon: '📋' },
    { id: 'completed', label: tApp('nav_completed'), icon: '✅' },
    { id: 'timeline',  label: tApp('nav_timeline'),  icon: '📅' },
    { id: 'report',    label: tApp('nav_report'),    icon: '📈' },
  ];

  const VIEW_LABELS = {
    dashboard: tApp('nav_dashboard'),
    inbox:     tApp('nav_inbox'),
    tasks:     tApp('nav_tasks'),
    completed: tApp('nav_completed'),
    timeline:  tApp('nav_timeline'),
    report:    tApp('nav_report'),
  };

  // กันค้างหน้า Loading: ถ้าล็อกอินแล้วแต่ 6 วิยังไม่มีชื่อทีม (profiles.name ว่าง) → แจ้ง + ปุ่มออก
  const [profileTimedOut, setProfileTimedOut] = useState(false);
  useEffect(() => {
    if (isSb && !!session && !currentUser && !recovery) {
      const id = setTimeout(() => setProfileTimedOut(true), 6000);
      return () => clearTimeout(id);
    }
    setProfileTimedOut(false);
  }, [isSb, session, currentUser, recovery]);

  // ── gating: เลือกหน้าจอเริ่มต้น ──────────────────────────────────────────────
  // โหมด Supabase: session===undefined=กำลังโหลด, null=ยังไม่ล็อกอิน, มี=เข้าแอป
  // โหมด local (ยังไม่ตั้งค่า Supabase): ใช้ name-picker เดิม
  const showRecovery = isSb && recovery && !!session;
  const showLogin   = isSb && session === null && !recovery;
  const showLoader  = isSb && (session === undefined || (!!session && !currentUser)) && !recovery;
  const showWelcome = !isSb && !currentUser;
  const showApp     = (isSb ? (!!session && !!currentUser) : !!currentUser) && !recovery;

  // ชุด C: ฟอร์มส่งงานสาธารณะ (?form=request) — แสดงฟอร์มอย่างเดียว ไม่ต้องล็อกอิน
  if (requestMode) {
    return (
      <LangContext.Provider value={{ lang, setLang }}>
        <RequestForm cfg={sbCfg} />
      </LangContext.Provider>
    );
  }

  return (
    <LangContext.Provider value={{ lang, setLang }}>
      {showWelcome  && <WelcomeScreen onSelect={handleUserChange} />}
      {showRecovery && <ResetPasswordScreen cfg={sbCfg} onDone={() => setRecovery(false)} />}
      {showLogin    && <LoginScreen cfg={sbCfg} onOpenSettings={() => setSettingsOpen(true)} />}
      {showLoader  && (
        <div className="welcome-overlay"><div className="welcome-card"><div className="welcome-logo"><img src={COMPANY_LOGO} alt="Hungry Hub" className="welcome-logo-img" /></div>
          <div className="welcome-sub" style={profileTimedOut && !!session ? { marginTop:12, color:'var(--danger)', fontWeight:600 } : { marginTop:8 }}>
            {profileTimedOut && !!session ? tApp('login_no_profile') : tApp('login_loading_app')}
          </div>
          {profileTimedOut && !!session && (
            <button className="btn btn-outline" style={{ width:'100%', marginTop:14, fontSize:'0.85rem' }} onClick={handleLogout}>⎋ {tApp('login_logout')}</button>
          )}
        </div></div>
      )}

      <div className="app-shell">
        {/* Backdrop for mobile off-canvas sidebar */}
        {sidebarOpen && <div className="sidebar-backdrop" onClick={() => setSidebarOpen(false)} />}

        {/* ─── Sidebar ─── */}
        <div className={`sidebar${sidebarOpen ? ' open' : ''}`}>
          {/* Logo */}
          <div className="sidebar-logo" style={{ padding:'10px 16px 6px', textAlign:'center' }}>
                      <div style={{ background:'#fff', borderRadius:10, padding:'6px 8px', display:'inline-block' }}>
                        <img src={COMPANY_LOGO} alt="Hungry Hub" style={{ width:120, height:'auto', display:'block' }} />
                      </div>
                    </div>

          {/* User selector — โหมด Supabase: ล็อกชื่อจาก profile + ปุ่มออกจากระบบ */}
          <div className="sidebar-user-section">
            <div className="sidebar-user-label">{tApp('user_label')}</div>
            {isAuthed ? (
              <div>
                <div className="sidebar-user-select" style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:8 }}>
                  <span style={{ fontWeight:600, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{currentUser || (session.user && session.user.email)}</span>
                </div>
                <button className="btn btn-outline" style={{ width:'100%', marginTop:8, fontSize:'0.8rem' }} onClick={handleLogout}>
                  ⎋ {tApp('login_logout')}
                </button>
              </div>
            ) : (
              <select className="sidebar-user-select" value={currentUser} onChange={e => handleUserChange(e.target.value)}>
                <option value="">{tApp('select_user')}</option>
                {USERS.map(u => <option key={u.name} value={u.name}>{u.name} ({tRole(u.role, lang)})</option>)}
              </select>
            )}
          </div>

          {/* Nav */}
          <div className="sidebar-nav">
            <div className="nav-section-label">{tApp('menu_main')}</div>
            {NAV.map(n => (
              <div key={n.id} className={`nav-item${view === n.id ? ' active' : ''}`} onClick={() => goView(n.id)}>
                <span className="nav-icon">{n.icon}</span>
                <span>{n.label}</span>
                {n.id === 'inbox' && newReqCount > 0 && <span className="nav-badge">{newReqCount > 9 ? '9+' : newReqCount}</span>}
              </div>
            ))}
            {DRIVE_URL && (
              <div className="nav-item" onClick={() => { setDriveOpen(true); setSidebarOpen(false); }}>
                <span className="nav-icon">📁</span>
                <span>{tApp('nav_drive')}</span>
              </div>
            )}
          </div>

          {/* Create button (manager only) */}
          {isManager && (
            <button className="sidebar-create-btn" onClick={() => { setCreateOpen(true); setSidebarOpen(false); }}>
              ＋ {tApp('create_task')}
            </button>
          )}

          {/* Team list */}
          <div className="sidebar-team">
            <div className="sidebar-team-label">{tApp('team')}</div>
            {USERS.map(u => (
              <div key={u.name} className="team-member">
                <div className="team-avatar-wrap">
                  <div className="avatar avatar-sm" style={{ background: u.color }}>{initials(u.name)}</div>
                  {onlineUsers.includes(u.name) && <span className="online-dot" title={tApp('presence_label')} />}
                </div>
                <div style={{ minWidth: 0 }}>
                  <div style={{ lineHeight: 1.2, display:'flex', alignItems:'center', gap:5 }}>
                    {u.name}
                    {u.training && <span title={tApp('training')} style={{ fontSize:'0.6rem' }}>🎓</span>}
                  </div>
                  <div className="team-member-role">{tRole(u.role, lang)}</div>
                  {u.ai && u.ai !== 'Mabelz' && <div className="team-member-role" style={{ opacity:0.85 }}>🤖 {u.ai}</div>}
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* ─── Main wrapper ─── */}
        <div className="main-wrapper">
          {/* Top bar */}
          <Topbar
            currentUser={currentUser}
            darkMode={darkMode}
            setDarkMode={setDarkMode}
            isManager={isManager}
            viewLabel={VIEW_LABELS[view] || 'Dashboard'}
            search={search}
            onSearch={handleSearch}
            tasks={visibleTasks}
            onToggleSidebar={() => setSidebarOpen(o => !o)}
            onSelectTask={handleSelectTask}
            syncStatus={backendStatus}
            onOpenSettings={() => setSettingsOpen(true)}
            privacyMode={privacyMode}
            onTogglePrivacy={() => setPrivacyMode(p => !p)}
            commentNotifs={commentNotifs}
            onOpenCommentNotif={openCommentNotif}
          />

          {/* Page content */}
          <div className="main-content">
            {view === 'dashboard' && (
              <Dashboard tasks={visibleTasks} currentUser={currentUser} onSelectTask={handleSelectTask} />
            )}
            {view === 'inbox' && (
              <InboxView cfg={sbCfg} onConvert={handleConvertRequest} />
            )}
            {view === 'tasks' && (
              <TaskList
                tasks={visibleTasks}
                currentUser={currentUser}
                onSelectTask={handleSelectTask}
                onEditTask={setEditingTask}
                onDeleteTask={setDeletingTask}
                onDuplicate={handleDuplicate}
                setCreateOpen={setCreateOpen}
                search={search}
                setSearch={setSearch}
              />
            )}
            {view === 'completed' && (
              <TaskList
                tasks={visibleTasks.filter(t => t.status === 'done')}
                currentUser={currentUser}
                onSelectTask={handleSelectTask}
                onEditTask={setEditingTask}
                onDeleteTask={setDeletingTask}
                onDuplicate={handleDuplicate}
                setCreateOpen={setCreateOpen}
                search={search}
                setSearch={setSearch}
                mode="completed"
              />
            )}
            {view === 'timeline' && (
              <TimelineView tasks={visibleTasks} currentUser={currentUser} onSelectTask={handleSelectTask} />
            )}
            {view === 'report' && (
              <ReportView tasks={visibleTasks} currentUser={currentUser} onSelectTask={handleSelectTask} showManager={isManager && !privacyMode} />
            )}
          </div>
        </div>
      </div>

      {/* Modals */}
      {selectedTask && (
        <TaskModal
          task={selectedTask}
          currentUser={currentUser}
          onClose={() => setSelectedTask(null)}
          onUpdate={updateTask}
        />
      )}
      {(createOpen || editingTask) && (
        <CreateTaskModal
          onClose={() => { setCreateOpen(false); setEditingTask(null); setConvertReq(null); setDuplicateSrc(null); }}
          onSave={editingTask ? handleEditSave : handleCreate}
          currentUser={currentUser}
          initialTask={editingTask || null}
          tasks={tasks}
          selfOnly={!isManager}
          prefill={convertReq ? {
            title: convertReq.title,
            description: (convertReq.details || '') + '\n\n— ' + tApp('inbox_from') + ': ' + convertReq.requester_name + (convertReq.requester_contact ? ' (' + convertReq.requester_contact + ')' : ''),
            category: convertReq.category || undefined,
          } : duplicateSrc ? {
            title: duplicateSrc.title,
            description: duplicateSrc.description || '',
            category: duplicateSrc.category,
            assignee: duplicateSrc.assignee,
            priority: duplicateSrc.priority,
            recurrence: duplicateSrc.recurrence || 'none',
          } : null}
        />
      )}
      {deletingTask && (
        <DeleteModal
          task={deletingTask}
          onClose={() => setDeletingTask(null)}
          onConfirm={handleDeleteConfirm}
        />
      )}
      {showApp && (<>
        <ChatWidget
          sbCfg={sbCfg}
          currentUser={currentUser}
          tasks={visibleTasks}
          isManager={currentUser === 'Big Boss'}
          ready={isAuthed}
        />
        <TeamChat sbCfg={sbCfg} currentUser={currentUser} ready={isAuthed} />
      </>)}
      {/* ชุด B: toast แจ้งเตือนเมื่อมีคนออนไลน์ */}
      {toasts.length > 0 && (
        <div className="toast-stack">
          {toasts.map(tt => <div key={tt.id} className="toast">{tt.text}</div>)}
        </div>
      )}
      {/* Drive กลาง — หน้าต่างดูไฟล์ในแอป */}
      {driveOpen && <DriveModal cfg={sbCfg} isManager={isManager} onClose={() => setDriveOpen(false)} />}
      {settingsOpen && (
        <SettingsModal
          cfg={sbCfg}
          authed={isAuthed}
          onClose={() => setSettingsOpen(false)}
          onSave={handleSaveSettings}
          onPushLocal={() => sb.pushAll(sbCfg, tasks)}
          isManager={isManager}
          onBackup={handleBackup}
          autoBackup={autoBackup}
          onToggleAutoBackup={toggleAutoBackup}
          lastBackup={lastBackup}
        />
      )}
    </LangContext.Provider>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
  /* PWA: ลงทะเบียน service worker (ทำงานเฉพาะบน https/โดเมนจริง — บน preview จะเงียบ ๆ ไม่พัง) */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('service-worker.js').catch(function () {});
    });
  }
</script>
</body>
</html>
