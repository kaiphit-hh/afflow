// ─── Mabelz Recommendation Engine ────────────────────────────────────────────

function mabelzRecommend(title, description, category, tasks, lang) {
  const en = lang === 'en';
  const text = (title + ' ' + description).toLowerCase();
  const ACTIVE = ['pending', 'in_progress', 'review'];

  const scores = { 'Ple': 0, 'Pang': 0, 'Nam': 0, 'Issan': 0 };

  // 1) คีย์เวิร์ดของแต่ละคน (ตามหน้าที่จริง) — weight 3
  const personKw = {
    'Ple': ['รับเงิน','รับชำระ','ใบเสร็จ','ใบกำกับ','ใบกำกับภาษี','ar','gift card','line gift','amaze','คอมมิช','ค่าคอม','คอมมิชชั่น','ร้านค้าชำระ','ร้านชำระ'],
    'Pang':     ['จ่าย','ทำจ่าย','ค่าใช้จ่าย','supplier','ซัพพลายเออร์','ap','ภาษีซื้อ','ภาษีขาย','ภ.พ','ภ.ง.ด','vat','นำส่งภาษี','ยื่นภาษี','ยื่นแบบ','สรรพากร','withholding','หัก ณ ที่จ่าย','pnd'],
    'Nam':      ['vendor','เปิด vendor','ผู้ขายรายใหม่','เจ้าใหม่','เปลี่ยนที่อยู่','ที่อยู่','เอกสาร','กรอกข้อมูล','กรอกเอกสาร','admin','ข้อสงสัย','สอบถาม'],
    'Issan':      ['สิงคโปร','มาเลเซีย','singapore','malaysia','sgd','myr',' sg ',' my ','ต่างประเทศ','overseas'],
  };
  Object.entries(personKw).forEach(([p, kws]) => kws.forEach(kw => { if (text.includes(kw)) scores[p] += 3; }));

  // 2) region override — งาน SG/MY ให้Issanเด่นชัด (weight 6)
  if (/singapore|malaysia|สิงคโปร|มาเลเซีย|sgd|myr/.test(text)) scores['Issan'] += 6;

  // 3) Workload penalty (งานในมือน้อย = ได้เปรียบ)
  ASSIGNEES.forEach(name => {
    const active = tasks.filter(t => t.assignee === name && ACTIVE.includes(t.status)).length;
    scores[name] -= active * 1.5;
  });
  scores['Issan'] -= 1; // เพิ่งเข้า กำลังเทรน — ลดภาระเล็กน้อย

  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const name   = sorted[0][0];

  // 4) แนะนำหมวดจาก keyword
  const catKw = {
    'ภาษี':        ['ภาษี','vat','ภ.พ','ภ.ง.ด','สรรพากร','withholding','หัก ณ ที่จ่าย','นำส่งภาษี','pnd'],
    'Gift Card':   ['gift card','line gift','amaze','บัตรของขวัญ'],
    'AR':          ['รับเงิน','รับชำระ','ใบเสร็จ','ใบกำกับ'],
    'AP':          ['จ่าย','ค่าใช้จ่าย','supplier','ซัพพลายเออร์'],
    'Admin':       ['vendor','ที่อยู่','เอกสาร','กรอก'],
    'ลูกค้า/Line': ['line official','line','อีเมล','ตอบ','สอบถาม','คอมมิช'],
  };
  let suggestedCat = null, bestCat = 0;
  Object.entries(catKw).forEach(([c, kws]) => {
    const hit = kws.filter(kw => text.includes(kw)).length;
    if (hit > bestCat) { bestCat = hit; suggestedCat = c; }
  });
  if (!suggestedCat) suggestedCat = ASSIGNEE_CATEGORY[name] || category;

  // 5) เหตุผล / reasons
  const reasons = [];
  const matched = (personKw[name] || []).filter(kw => text.includes(kw));
  const roleTxt = tRole(USERS.find(u => u.name === name)?.role || '', lang);
  if (matched.length) reasons.push(en ? `Keywords found: ${matched.slice(0, 3).join(', ')}` : `คีย์เวิร์ดที่พบ: ${matched.slice(0, 3).join(', ')}`);
  reasons.push(en ? `Handles ${roleTxt}` : `ดูแล ${roleTxt}`);
  const activeCount = tasks.filter(t => t.assignee === name && ACTIVE.includes(t.status)).length;
  reasons.push(en ? `${activeCount} active task(s) on hand` : `งานในมืออยู่ ${activeCount} งาน`);
  if (name === 'Issan') reasons.push(en ? '⚠️ New team member in training — needs a mentor to review' : '⚠️ เพิ่งเข้าทีม กำลังเทรน — ควรมีพี่เลี้ยงช่วยตรวจ');
  if (suggestedCat === 'ภาษี') reasons.push(en ? '🔴 Tax task — set status to "In Review" before closing' : '🔴 งานภาษี ควรตั้งสถานะ "รอตรวจสอบ" ก่อนปิดงาน');

  return {
    recommended: name,
    runner: sorted[1] ? sorted[1][0] : null,
    reasons,
    category: suggestedCat,
    aiBuddy: USERS.find(u => u.name === name)?.ai || null,
  };
}

// ─── CreateTaskModal ──────────────────────────────────────────────────────────

function CreateTaskModal({ onClose, onSave, currentUser, initialTask, tasks, selfOnly, prefill }) {
  const editing = !!initialTask;
  const [form, setForm] = useState(
    editing
      ? { title: initialTask.title, description: initialTask.description || '', assignee: initialTask.assignee, category: initialTask.category, priority: initialTask.priority, deadline: initialTask.deadline, status: initialTask.status, recurrence: initialTask.recurrence || 'none' }
      : { title: (prefill && prefill.title) || '', description: (prefill && prefill.description) || '', assignee: (prefill && prefill.assignee != null) ? prefill.assignee : (selfOnly ? currentUser : ''), category: (prefill && prefill.category) || 'AR', priority: (prefill && prefill.priority) || 'medium', deadline: '', status: 'pending', recurrence: (prefill && prefill.recurrence) || 'none' }
  );
  const [mabelzTip, setMabelzTip] = React.useState(null);
  const [thinking, setThinking]   = React.useState(false);
  const debounceRef = React.useRef(null);
  const { t, lang } = useT();

  function set(k, v) { setForm(f => ({ ...f, [k]: v })); }

  // Auto-assign ทันทีที่ title หรือ description หรือ category เปลี่ยน (debounce 600ms)
  React.useEffect(() => {
    if (editing || selfOnly) return;   // selfOnly = ล็อกผู้รับผิดชอบเป็นตัวเอง ไม่ต้อง auto-assign
    if (!form.title.trim()) { setMabelzTip(null); return; }
    setThinking(true);
    clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => {
      const result = mabelzRecommend(form.title, form.description, form.category, tasks || [], lang);
      setMabelzTip(result);
      setForm(f => ({
        ...f,
        assignee: result.recommended,
        category: result.category || f.category,
      }));
      setThinking(false);
    }, 600);
    return () => clearTimeout(debounceRef.current);
  }, [form.title, form.description, form.category, lang]);

  function handleSave() {
    if (!form.title.trim())   { alert(t('alert_title')); return; }
    if (!form.deadline)       { alert(t('alert_deadline')); return; }
    if (!form.assignee)       { alert(t('alert_assignee')); return; }
    onSave(form);
  }

  // งานประจำ/ภาษีสรรพากร
  const taxRec = parseTaxRec(form.recurrence);
  const recSelectValue = taxRec ? ('tax:' + taxRec.form) : (form.recurrence || 'none');
  function onRecChange(val) {
    if (val.indexOf('tax:') === 0) {
      const fc = val.split(':')[1];
      const ef = taxRec ? taxRec.efile : false;
      setForm(f => ({ ...f, recurrence: 'tax:' + fc + ':' + (ef ? 'efile' : 'paper'), deadline: upcomingTaxDeadline(fc, ef, TODAY) }));
    } else {
      setForm(f => ({ ...f, recurrence: val }));
    }
  }
  function onEfileChange(checked) {
    if (!taxRec) return;
    setForm(f => ({ ...f, recurrence: 'tax:' + taxRec.form + ':' + (checked ? 'efile' : 'paper'), deadline: upcomingTaxDeadline(taxRec.form, checked, TODAY) }));
  }

  return (
    <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">{editing ? t('modal_edit') : t('modal_create')}</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-group">
            <label className="form-label">{t('f_title')}</label>
            <input className="form-input" value={form.title} onChange={e => set('title', e.target.value)} placeholder={t('f_title_ph')} autoFocus />
          </div>
          <div className="form-group">
            <label className="form-label">{t('f_desc')}</label>
            <textarea className="form-textarea" value={form.description} onChange={e => set('description', e.target.value)} placeholder={t('f_desc_ph')} />
          </div>

          {/* Mabelz Auto-assign Card */}
          {!editing && (
            <div style={{ marginBottom:14, borderRadius:12, border: mabelzTip ? '2px solid #bfdbfe' : '2px dashed #cbd5e1', background: mabelzTip ? '#eff6ff' : '#f8fafc', padding:'12px 14px', minHeight:64, display:'flex', alignItems:'center', gap:12 }}>
              {thinking ? (
                <div style={{ display:'flex', alignItems:'center', gap:10, color:'#64748b', fontSize:'0.88rem' }}>
                  <span style={{ fontSize:'1.2rem' }}>🤔</span>
                  <div><strong style={{ color:'#1e3a5f' }}>{t('mabelz_analyzing')}</strong><br/><span style={{ fontSize:'0.8rem' }}>{t('mabelz_finding')}</span></div>
                </div>
              ) : mabelzTip ? (
                <div style={{ width:'100%' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:6 }}>
                    <div style={{ width:36, height:36, borderRadius:'50%', background: getUserColor(mabelzTip.recommended), display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontWeight:700, fontSize:'0.85rem', flexShrink:0 }}>
                      {initials(mabelzTip.recommended)}
                    </div>
                    <div>
                      <div style={{ fontWeight:700, color:'#1e3a5f', fontSize:'0.9rem' }}>{t('mabelz_assign')} <span style={{ color:'#2563eb' }}>{mabelzTip.recommended}</span></div>
                      <div style={{ fontSize:'0.75rem', color:'#64748b' }}>{t('mabelz_runner', { name: mabelzTip.runner })}</div>
                    </div>
                  </div>
                  <ul style={{ margin:0, paddingLeft:18, color:'#374151', fontSize:'0.8rem', lineHeight:1.8 }}>
                    {mabelzTip.reasons.map((r,i) => <li key={i}>{r}</li>)}
                  </ul>
                </div>
              ) : (

// ─── SettingsModal (Phase 2: เชื่อม Google Sheet) ──────────────────────────────

function SettingsModal({ cfg, authed, onClose, onSave, onPushLocal, isManager, onBackup, autoBackup, onToggleAutoBackup, lastBackup }) {
  const { t, lang } = useT();
  const [url, setUrl] = useState(cfg.url || '');
  const [key, setKey] = useState(cfg.key || '');
  const [testState, setTestState] = useState('');   // '' | testing | ok | fail
  const [pushState, setPushState] = useState('');   // '' | pushing | done | fail
  const [pushMsg,   setPushMsg]   = useState('');
  const [backupState, setBackupState] = useState('');  // '' | backing | done | fail
  const [backupMsg,   setBackupMsg]   = useState('');

  async function backupNow() {
    setBackupState('backing'); setBackupMsg('');
    try {
      const res = await onBackup();
      setBackupState('done'); setBackupMsg(t('backup_done', { name: (res && res.name) || '' }));
    } catch (e) {
      setBackupState('fail'); setBackupMsg(t('backup_fail') + (e && e.message ? ' (' + String(e.message).slice(0, 120) + ')' : ''));
    }
  }
  const fmtBackupTime = (iso) => { try { return new Date(iso).toLocaleString(lang === 'en' ? 'en-GB' : 'th-TH'); } catch (e) { return iso; } };

  const saved = url.trim() === (cfg.url || '') && key.trim() === (cfg.key || '');

  async function testConn() {
    if (!url.trim() || !key.trim()) { setTestState('fail'); return; }
    setTestState('testing');
    try {
      const c = makeSb({ url: url.trim(), key: key.trim() });
      if (!c) { setTestState('fail'); return; }
      const { error } = await c.from(SB_TABLE).select('id').limit(1);
      setTestState(!error ? 'ok' : 'fail');
    } catch (e) { setTestState('fail'); }
  }

  async function pushAll() {
    if (!saved || !cfg.url) { setPushState('fail'); setPushMsg(t('settings_save_first')); return; }
    setPushState('pushing'); setPushMsg('');
    try {
      const n = await onPushLocal();          // ใช้ไคลเอนต์ที่ล็อกอินแล้วจาก App
      setPushState('done'); setPushMsg(t('settings_push_done', { n }));
    } catch (e) { setPushState('fail'); setPushMsg(t('settings_push_fail')); }
  }

  return (
    <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal" style={{ maxWidth:540 }}>
        <div className="modal-header">
          <div className="modal-title">{t('settings_title')}</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <p style={{ fontSize:'0.82rem', color:'var(--text-muted)', marginBottom:16, lineHeight:1.6 }}>{t('settings_intro')}</p>

          <div className="form-group">
            <label className="form-label">{t('settings_url')}</label>
            <input className="form-input" value={url} onChange={e => { setUrl(e.target.value); setTestState(''); }} placeholder={t('settings_url_ph')} />
          </div>
          <div className="form-group">
            <label className="form-label">{t('settings_key')}</label>
            <input className="form-input" value={key} onChange={e => { setKey(e.target.value); setTestState(''); }} placeholder={t('settings_key_ph')} />
          </div>

          <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:6 }}>
            <button className="btn btn-outline" onClick={testConn} disabled={testState === 'testing'}>
              {testState === 'testing' ? t('settings_testing') : t('settings_test')}
            </button>
            {testState === 'ok'   && <span style={{ color:'var(--success)', fontSize:'0.85rem', fontWeight:600 }}>{t('settings_test_ok')}</span>}
            {testState === 'fail' && <span style={{ color:'var(--danger)',  fontSize:'0.85rem', fontWeight:600 }}>{t('settings_test_fail')}</span>}
          </div>

          {/* ปุ่มอัปโหลดข้อมูลในเครื่องขึ้น Supabase — เห็นเฉพาะตอนล็อกอินแล้ว + บันทึก config แล้ว */}
          {authed && cfg.url && (
            <>
              <div style={{ borderTop:'1px solid var(--border)', margin:'16px 0' }} />
              <div style={{ display:'flex', alignItems:'center', gap:12, flexWrap:'wrap' }}>
                <button className="btn btn-outline" onClick={pushAll} disabled={pushState === 'pushing'}>
                  {pushState === 'pushing' ? t('settings_pushing') : t('settings_push')}
                </button>
                {pushMsg && <span style={{ fontSize:'0.82rem', fontWeight:600, color: pushState === 'done' ? 'var(--success)' : 'var(--danger)' }}>{pushMsg}</span>}
              </div>
              <p style={{ fontSize:'0.72rem', color:'var(--warning)', marginTop:6 }}>{t('settings_push_warn')}</p>
            </>
          )}

          {/* สำรองข้อมูลขึ้น Google Drive — เฉพาะหัวหน้า */}
          {authed && isManager && (
            <>
              <div style={{ borderTop:'1px solid var(--border)', margin:'16px 0' }} />
              <div style={{ fontWeight:700, fontSize:'0.92rem', marginBottom:6 }}>💾 {t('backup_title')}</div>
              <p style={{ fontSize:'0.78rem', color:'var(--text-muted)', marginBottom:10, lineHeight:1.6 }}>{t('backup_intro')}</p>
              <div style={{ display:'flex', alignItems:'center', gap:12, flexWrap:'wrap', marginBottom:10 }}>
                <button className="btn btn-primary" onClick={backupNow} disabled={backupState === 'backing'}>
                  {backupState === 'backing' ? t('backup_running') : '💾 ' + t('backup_now')}
                </button>
                {backupMsg && <span style={{ fontSize:'0.8rem', fontWeight:600, color: backupState === 'done' ? 'var(--success)' : 'var(--danger)' }}>{backupMsg}</span>}
              </div>
              <label style={{ display:'flex', alignItems:'center', gap:8, fontSize:'0.84rem', cursor:'pointer', marginBottom:6 }}>
                <input type="checkbox" checked={autoBackup} onChange={e => onToggleAutoBackup(e.target.checked)} style={{ width:16, height:16 }} />
                <span>{t('backup_auto')}</span>
              </label>
              {lastBackup && <div style={{ fontSize:'0.74rem', color:'var(--text-muted)' }}>{t('backup_last')}: {fmtBackupTime(lastBackup)}</div>}
            </>
          )}

          <div style={{ display:'flex', gap:10, justifyContent:'flex-end', alignItems:'center', marginTop:22 }}>
            {cfg.url && (
              <button className="btn btn-outline" style={{ marginRight:'auto', color:'var(--danger)' }} onClick={() => onSave({ url:'', key:'' })}>
                {t('settings_disconnect')}
              </button>
            )}
            <button className="btn btn-outline" onClick={onClose}>{t('cancel')}</button>
            <button className="btn btn-primary" onClick={() => onSave({ url: url.trim(), key: key.trim() })}>{t('settings_save')}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// #4: นาฬิกา วันที่ + เวลา (อัปเดตทุกวินาที)
function TopbarClock() {
  const { lang } = useT();
  const [now, setNow] = useState(() => new Date());
  useEffect(() => { const id = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(id); }, []);
  const dowTH = ['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];
  const dowEN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const pad = n => String(n).padStart(2, '0');
  const dow  = (lang === 'en' ? dowEN : dowTH)[now.getDay()];
  const mo   = (lang === 'en' ? MONTH_EN : MONTH_TH)[now.getMonth()];
  const yr   = lang === 'en' ? now.getFullYear() : now.getFullYear() + 543;
  const time = pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
  return (
    <div className="topbar-clock" title={dow + ' ' + now.getDate() + ' ' + mo + ' ' + yr}>
      <span className="topbar-clock-date">{dow} {now.getDate()} {mo} {yr}</span>
      <span className="topbar-clock-time">🕐 {time}</span>
    </div>
  );
}

function Topbar({ currentUser, darkMode, setDarkMode, isManager, viewLabel, search, onSearch, tasks, onToggleSidebar, onSelectTask, syncStatus, onOpenSettings, privacyMode, onTogglePrivacy, commentNotifs = [], onOpenCommentNotif }) {
  const { t, lang, setLang } = useT();
  const [notifOpen, setNotifOpen] = React.useState(false);
  const [notifPerm, setNotifPerm] = React.useState(('Notification' in window) ? Notification.permission : 'unsupported');
  function enableNotif() {
    if (!('Notification' in window)) return;
    Notification.requestPermission().then((p) => setNotifPerm(p)).catch(() => {});
  }

  const syncMeta = {
    local:   { dot:'#94a3b8', label: t('sync_local')   },
    online:  { dot:'#10b981', label: t('sync_online')  },
    offline: { dot:'#ef4444', label: t('sync_offline') },
    syncing: { dot:'#f59e0b', label: t('sync_syncing') },
  }[syncStatus] || { dot:'#94a3b8', label: t('sync_local') };

  // งานที่ใกล้ครบกำหนด/เกินกำหนด (ยังไม่เสร็จ และเหลือ ≤ 3 วัน) — ตามสิทธิ์ผู้ใช้
  const scope  = isManager ? tasks : tasks.filter(t => t.assignee === currentUser);
  const alerts = scope
    .filter(x => x.status !== 'done' && daysDiff(x.deadline) <= 3)
    .map(x => ({ ...x, dd: daysDiff(x.deadline) }))
    .sort((a, b) => a.dd - b.dd);

  function alertMeta(dd) {
    if (dd < 0)  return { cls: 'red',   text: t('overdue_days', { n: Math.abs(dd) }) };
    if (dd === 0) return { cls: 'red',   text: t('due_today') };
    if (dd === 1) return { cls: 'amber', text: t('due_tomorrow') };
    return { cls: 'blue', text: t('in_days', { n: dd }) };
  }

  return (
    <div className="topbar">
      <button className="topbar-hamburger" onClick={onToggleSidebar} title={t('menu')} aria-label={t('menu')}>☰</button>

      <div className="topbar-breadcrumb">
        <span>Accounting &amp; Finance</span>
        <span className="topbar-breadcrumb-sep">›</span>
        <span className="topbar-breadcrumb-current">{viewLabel}</span>
      </div>

      <div className="topbar-search">
        <span className="topbar-search-icon">🔍</span>
        <input
          placeholder={t('search_ph')}
          value={search}
          onChange={e => onSearch(e.target.value)}
        />
        {search && (
          <button className="topbar-search-clear" onClick={() => onSearch('')} title={t('clear')}>✕</button>
        )}
      </div>

      <div className="topbar-actions">
        {/* #4: นาฬิกาวันที่+เวลา */}
        <TopbarClock />

        {/* #2: โหมดส่วนตัว (เฉพาะหัวหน้า) — ซ่อนงานตัวเองตอนโชว์ลูกน้อง */}
        {isManager && (
          <button className={'topbar-privacy' + (privacyMode ? ' on' : '')} onClick={onTogglePrivacy} title={t('privacy_mode')}>
            <span>{privacyMode ? '🔒' : '🔓'}</span>
            <span className="privacy-label">{privacyMode ? t('privacy_on') : t('privacy_off')}</span>
          </button>
        )}

        {/* #2: หัวหน้าเห็นเฟือง (ตั้งค่า Supabase) — พนักงานเห็นแค่สถานะออนไลน์ */}
        {isManager ? (
          <div className="topbar-sync" onClick={onOpenSettings} title={t('settings')}>
            <span className="sync-dot" style={{ background: syncMeta.dot }} />
            <span className="sync-label">{syncMeta.label}</span>
            <span className="sync-gear">⚙️</span>
          </div>
        ) : (
          <div className="topbar-sync no-click">
            <span className="sync-dot" style={{ background: syncMeta.dot }} />
            <span className="sync-label">{syncMeta.label}</span>
          </div>
        )}

        {/* Language toggle TH / EN */}
        <div className="topbar-lang-toggle" onClick={() => setLang(lang === 'th' ? 'en' : 'th')} title="TH / EN">
          <span className={`lang-opt${lang === 'th' ? ' active' : ''}`}>TH</span>
          <span className="lang-sep">/</span>
          <span className={`lang-opt${lang === 'en' ? ' active' : ''}`}>EN</span>
        </div>

        {/* Dark mode toggle */}
        <div className="topbar-dark-toggle" onClick={() => setDarkMode(d => !d)}>
          <span>{darkMode ? '🌙' : '☀️'}</span>
          <div className={`toggle-switch${darkMode ? ' on' : ''}`}>
            <div className="toggle-knob" />
          </div>
          <span className="topbar-dark-label" style={{ fontSize:'0.75rem' }}>{t('dark_mode')}</span>
        </div>

        {/* Notification bell */}
        <div className="topbar-notif-wrap">
          <div className="topbar-notif" title={t('notif')} onClick={() => setNotifOpen(o => !o)}>
            🔔
            {(alerts.length + commentNotifs.length) > 0 && <div className="notif-badge">{(alerts.length + commentNotifs.length) > 9 ? '9+' : (alerts.length + commentNotifs.length)}</div>}
          </div>
          {notifOpen && (
            <>
              <div className="notif-backdrop" onClick={() => setNotifOpen(false)} />
              <div className="notif-dropdown">
                <div className="notif-dropdown-header">
                  {t('notif')} {alerts.length > 0 && `(${alerts.length})`}
                </div>
                {notifPerm === 'default' && (
                  <div style={{ padding:'10px 12px', borderBottom:'1px solid var(--border)' }}>
                    <button className="btn btn-primary" style={{ width:'100%', fontSize:'0.78rem' }} onClick={enableNotif}>🔔 {t('notif_enable')}</button>
                  </div>
                )}
                {notifPerm === 'granted' && (
                  <div style={{ padding:'7px 12px', fontSize:'0.72rem', color:'var(--success)', borderBottom:'1px solid var(--border)' }}>✓ {t('notif_on')}</div>
                )}
                {notifPerm === 'denied' && (
                  <div style={{ padding:'7px 12px', fontSize:'0.72rem', color:'var(--text-muted)', borderBottom:'1px solid var(--border)' }}>{t('notif_blocked')}</div>
                )}
                {commentNotifs.length > 0 && (
                  <div className="notif-list" style={{ borderBottom:'1px solid var(--border)' }}>
                    <div style={{ fontSize:'0.74rem', fontWeight:700, color:'var(--text-muted)', padding:'6px 10px 4px' }}>{t('cmt_notif_section')}</div>
                    {commentNotifs.map(cn => (
                      <div key={cn.id} className="notif-item" onClick={() => { onOpenCommentNotif(cn); setNotifOpen(false); }}>
                        <div className="notif-dot-ind blue" />
                        <div style={{ minWidth:0, flex:1 }}>
                          <div className="notif-item-title"><b>{cn.author}</b> {t('cmt_notif_commented')} · {cn.taskTitle}</div>
                          {cn.text && <div className="notif-item-meta">“{cn.text}”</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
                {alerts.length === 0 ? (
                  <div className="notif-empty">{t('no_upcoming')}</div>
                ) : (
                  <div className="notif-list">
                    {alerts.map(x => {
                      const m = alertMeta(x.dd);
                      return (
                        <div
                          key={x.id}
                          className="notif-item"
                          onClick={() => { onSelectTask(x); setNotifOpen(false); }}
                        >
                          <div className={`notif-dot-ind ${m.cls}`} />
                          <div style={{ minWidth: 0, flex: 1 }}>
                            <div className="notif-item-title">{x.title}</div>
                            <div className="notif-item-meta">
                              {isManager ? `${x.assignee} • ` : ''}{m.text} • {formatDate(x.deadline, lang)}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </>
          )}
        </div>

        {/* User avatar */}
        <div
          className="topbar-avatar"
          style={{ background: getUserColor(currentUser) }}
          title={currentUser}
        >
          {initials(currentUser)}
        </div>
      </div>
    </div>
  );
}

// ─── DonutChart (Chart.js) ────────────────────────────────────────────────────

function DonutChart({ tasks }) {
  const { t, lang } = useT();
  const canvasRef = React.useRef(null);
  const chartRef  = React.useRef(null);

  const data = ASSIGNEES.map(name => ({
    name,
    count: tasks.filter(t => t.assignee === name && t.status !== 'done').length,
    color: getUserColor(name),
  })).filter(d => d.count > 0);

  const total = data.reduce((s, d) => s + d.count, 0);

  React.useEffect(() => {
    if (!canvasRef.current || typeof Chart === 'undefined') return;
    if (chartRef.current) chartRef.current.destroy();

    chartRef.current = new Chart(canvasRef.current, {
      type: 'doughnut',
      data: {
        labels: data.map(d => d.name),
        datasets: [{
          data: data.map(d => d.count),
          backgroundColor: data.map(d => d.color),
          borderWidth: 2,
          borderColor: 'transparent',
          hoverOffset: 6,
        }],
      },
      options: {
        cutout: '72%',
        plugins: { legend: { display: false }, tooltip: {
          callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw} ${t('unit_tasks')}` }
        }},
        animation: { animateRotate: true, duration: 600 },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [tasks.length, JSON.stringify(data.map(d => d.count)), lang]);

  return (
    <div className="card" style={{ padding: '20px' }}>
      <div className="card-title">{t('chart_team_active')}</div>
      <div className="chart-wrap">
        <canvas ref={canvasRef} />
        <div className="donut-center">
          <div className="donut-center-value">{total}</div>
          <div className="donut-center-label">{t('chart_active_center')}</div>
        </div>
      </div>
      <div className="chart-legend">
        {data.map(d => (
          <div key={d.name} className="chart-legend-item">
            <div className="chart-legend-dot" style={{ background: d.color }} />
            <span className="chart-legend-name">{d.name}</span>
            <span className="chart-legend-val">{d.count}</span>
          </div>
        ))}
        {data.length === 0 && <div style={{ textAlign:'center', color:'var(--text-muted)', fontSize:'0.85rem', padding:'10px' }}>{t('chart_no_active')}</div>}
      </div>
    </div>
  );
}

// ─── BarChart (Chart.js) ──────────────────────────────────────────────────────

function StatusBarChart({ tasks }) {
  const { t, lang } = useT();
  const canvasRef = React.useRef(null);
  const chartRef  = React.useRef(null);

  const statuses = [
    { key: 'pending',     color: '#94a3b8' },
    { key: 'in_progress', color: '#6366f1' },
    { key: 'review',      color: '#d97706' },
    { key: 'done',        color: '#10b981' },
    { key: 'blocked',     color: '#ef4444' },
  ].map(s => ({ ...s, label: tStatusShort(s.key, lang) }));
  const counts = statuses.map(s => tasks.filter(t => t.status === s.key).length);

  React.useEffect(() => {
    if (!canvasRef.current || typeof Chart === 'undefined') return;
    if (chartRef.current) chartRef.current.destroy();

    chartRef.current = new Chart(canvasRef.current, {
      type: 'bar',
      data: {
        labels: statuses.map(s => s.label),
        datasets: [{
          data: counts,
          backgroundColor: statuses.map(s => s.color + 'cc'),
          borderColor: statuses.map(s => s.color),
          borderWidth: 2,
          borderRadius: 8,
          borderSkipped: false,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: {
          callbacks: { label: ctx => ` ${ctx.raw} ${t('unit_tasks')}` }
        }},
        scales: {
          y: {
            beginAtZero: true,
            ticks: { stepSize: 1, color: '#94a3b8', font: { family: 'Sarabun' } },
            grid: { color: 'rgba(148,163,184,0.15)' },
          },
          x: {
            ticks: { color: '#94a3b8', font: { family: 'Sarabun', size: 11 } },
            grid: { display: false },
          },
        },
        animation: { duration: 600 },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [tasks.length, JSON.stringify(counts), lang]);

  return (
    <div className="card" style={{ padding: '20px' }}>
      <div className="card-title">{t('chart_by_status')}</div>
      <div className="chart-wrap" style={{ height: 200 }}>
        <canvas ref={canvasRef} />
      </div>
    </div>
  );
}

// ─── PersonalDonut (Chart.js) — สรุปงานของพนักงานรายคน ────────────────────────

function PersonalDonut({ tasks }) {
  const { t, lang } = useT();
  const canvasRef = React.useRef(null);
  const chartRef  = React.useRef(null);

  const segs = [
    { key: 'done',        color: '#10b981' },
    { key: 'review',      color: '#d97706' },
    { key: 'in_progress', color: '#6366f1' },
    { key: 'pending',     color: '#94a3b8' },
    { key: 'blocked',     color: '#ef4444' },
  ].map(s => ({ ...s, label: tStatusShort(s.key, lang), count: tasks.filter(t => t.status === s.key).length }))
   .filter(s => s.count > 0);

  const total = tasks.length;
  const done  = tasks.filter(t => t.status === 'done').length;
  const pct   = total > 0 ? Math.round((done / total) * 100) : 0;

  React.useEffect(() => {
    if (!canvasRef.current || typeof Chart === 'undefined') return;
    if (chartRef.current) chartRef.current.destroy();

    chartRef.current = new Chart(canvasRef.current, {
      type: 'doughnut',
      data: {
        labels: segs.map(s => s.label),
        datasets: [{
          data: segs.map(s => s.count),
          backgroundColor: segs.map(s => s.color),
          borderWidth: 2,
          borderColor: 'transparent',
          hoverOffset: 6,
        }],
      },
      options: {
        cutout: '72%',
        plugins: { legend: { display: false }, tooltip: {
          callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw} ${t('unit_tasks')}` }
        }},
        animation: { animateRotate: true, duration: 600 },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [tasks.length, JSON.stringify(segs.map(s => s.count)), lang]);

  return (
    <div className="card" style={{ padding: '20px' }}>
      <div className="card-title">{t('chart_my_summary')}</div>
      <div className="chart-wrap">
        <canvas ref={canvasRef} />
        <div className="donut-center">
          <div className="donut-center-value">{pct}%</div>
          <div className="donut-center-label">{t('chart_done_center')}</div>
        </div>
      </div>
      <div className="chart-legend">
        {segs.map(s => (
          <div key={s.key} className="chart-legend-item">
            <div className="chart-legend-dot" style={{ background: s.color }} />
            <span className="chart-legend-name">{s.label}</span>
            <span className="chart-legend-val">{s.count}</span>
          </div>
        ))}
        {total === 0 && <div style={{ textAlign:'center', color:'var(--text-muted)', fontSize:'0.85rem', padding:'10px' }}>{t('no_tasks_yet')}</div>}
      </div>
    </div>
  );
}

// ─── Dashboard ────────────────────────────────────────────────────────────────

function Dashboard({ tasks, currentUser, onSelectTask }) {
  const { t, lang } = useT();
  const isManager = currentUser === 'Big Boss';
  const myTasks   = isManager ? tasks : tasks.filter(t => t.assignee === currentUser);

  const stats = {
    total:      myTasks.length,
    inProgress: myTasks.filter(t => t.status === 'in_progress').length,
    done:       myTasks.filter(t => t.status === 'done').length,
    pending:    myTasks.filter(t => t.status === 'pending').length,
    overdue:    myTasks.filter(t => t.status !== 'done' && daysDiff(t.deadline) < 0).length,
  };
  const completionPct = stats.total > 0 ? Math.round((stats.done / stats.total) * 100) : 0;
  const activeCount   = stats.total - stats.done;

  // ภาพรวมงานทั้งทีม — เรียงงานที่ยังไม่เสร็จ + ใกล้ครบ/เลยกำหนด ขึ้นก่อน (ช่วยกันเตือน)
  const teamTasks = React.useMemo(() => [...tasks].sort((a, b) => {
    const ad = a.status === 'done', bd = b.status === 'done';
    if (ad !== bd) return ad ? 1 : -1;
    return (a.deadline || '').localeCompare(b.deadline || '');
  }), [tasks]);

  // ทักทายตามช่วงเวลา / time-based greeting
  const hr = new Date().getHours();
  const greeting = hr < 12 ? t('greet_morning') : hr < 17 ? t('greet_afternoon') : t('greet_evening');

  // This week Mon-Sun
  const todayObj  = new Date(TODAY + 'T00:00:00');
  const dow       = todayObj.getDay();
  const moOffset  = dow === 0 ? -6 : 1 - dow;
  const DAY_SHORT = lang === 'en' ? ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'] : ['จ','อ','พ','พฤ','ศ','ส','อา'];
  const weekDays  = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(todayObj);
    d.setDate(todayObj.getDate() + moOffset + i);
    return d;
  });
  function isoDate(d) { return d.toISOString().slice(0, 10); }

  return (
    <div>
      <div className="page-header">
        <div className="page-title">{greeting}, {currentUser}! 👋</div>
        <div className="page-subtitle">{t('dash_welcome', { date: thaiDateFull(TODAY, lang) })}</div>
      </div>

      {/* Stat cards */}
      <div className="stat-grid">
        <div className="stat-card blue">
          <div className="stat-card-icon blue">📋</div>
          <div className="stat-label">{isManager ? t('stat_total') : t('stat_total_mine')}</div>
          <div className="stat-value">{stats.total}</div>
          <div className="stat-trend muted">{t('active_n', { n: activeCount })}</div>
          <div className="stat-watermark">📋</div>
        </div>
        <div className="stat-card amber">
          <div className="stat-card-icon amber">⚙️</div>
          <div className="stat-label">{t('stat_inprogress')}</div>
          <div className="stat-value">{stats.inProgress}</div>
          <div className="stat-trend muted">{t('wait_start', { n: stats.pending })}</div>
          <div className="stat-watermark">⚙️</div>
        </div>
        <div className="stat-card green">
          <div className="stat-card-icon green">✅</div>
          <div className="stat-label">{t('stat_done')}</div>
          <div className="stat-value">{stats.done}</div>
          <div className="stat-trend up">{t('progress_n', { n: completionPct })}</div>
          <div className="stat-watermark">✅</div>
        </div>
        <div className="stat-card red">
          <div className="stat-card-icon red">⚠️</div>
          <div className="stat-label">{t('stat_overdue')}</div>
          <div className="stat-value">{stats.overdue}</div>
          <div className={`stat-trend ${stats.overdue > 0 ? 'warn' : 'up'}`}>
            {stats.overdue > 0 ? t('need_urgent') : t('no_overdue')}
          </div>
          <div className="stat-watermark">⚠️</div>
        </div>
      </div>

      {/* Charts row */}
      <div className="chart-row">
        {isManager
          ? <DonutChart tasks={tasks} />
          : <PersonalDonut tasks={myTasks} />}
        <StatusBarChart tasks={myTasks} />
      </div>

      {/* Task table */}
      <div className="card" style={{ marginBottom:20 }}>
        <div className="card-title">
          👥 {t('card_team_overview')}
          <span style={{ marginLeft:'auto', fontSize:'0.75rem', fontWeight:500, color:'var(--text-muted)' }}>
            {t('items_n', { n: teamTasks.length })}
          </span>
        </div>
        {teamTasks.length === 0 ? (
          <div className="empty-state"><div className="empty-icon">🎉</div><div className="empty-text">{t('no_tasks_now')}</div></div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>{t('th_title')}</th>
                  <th>{t('th_assignee')}</th>
                  <th>{t('th_category')}</th>
                  <th>{t('th_status')}</th>
                  <th>{t('th_priority')}</th>
                  <th>{t('th_deadline')}</th>
                  <th>{t('th_timeleft')}</th>
                </tr>
              </thead>
              <tbody>
                {teamTasks.map(task => (
                  <tr key={task.id} className={rowClass(task.deadline, task.status)} style={{ borderLeft: '4px solid ' + getUserColor(task.assignee) }} onClick={() => onSelectTask(task)}>
                    <td style={{ maxWidth:240, fontWeight:500 }}>{task.title}</td>
                    <td>
                      <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                        <Avatar name={task.assignee} size="sm" />
                        <span>{task.assignee}</span>
                      </div>
                    </td>
                    <td><span style={{ fontSize:'0.8rem', color:'var(--text-muted)' }}>{tCat(task.category, lang)}</span></td>
                    <td><StatusBadge status={task.status} /></td>
                    <td><PriorityBadge priority={task.priority} /></td>
                    <td style={{ fontSize:'0.85rem' }}>{formatDate(task.deadline, lang)}</td>
                    <td><Countdown deadline={task.deadline} status={task.status} /></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {/* Week timeline */}
      <div className="card">
        <div className="card-title">{t('week_timeline')}</div>
        <div className="week-timeline">
          {weekDays.map((d, i) => {
            const ds      = isoDate(d);
            const isToday = ds === TODAY;
            const wTasks  = tasks.filter(t => t.deadline === ds && (isManager || t.assignee === currentUser));
            return (
              <div key={ds} className={`week-day${isToday ? ' today-col' : ''}`}>
                <div className="week-day-label">{DAY_SHORT[i]}</div>
                <div className="week-day-date" style={{ color: isToday ? 'var(--primary)' : 'var(--text)' }}>{d.getDate()}</div>
                {wTasks.map(t => (
                  <span
                    key={t.id}
                    className="week-pill"
                    style={{ background: getUserColor(t.assignee) }}
                    title={t.title}
                    onClick={() => onSelectTask(t)}
                  >
                    {t.title.length > 11 ? t.title.slice(0, 11) + '…' : t.title}
                  </span>
                ))}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── TaskList ─────────────────────────────────────────────────────────────────

function TaskList({ tasks, currentUser, onSelectTask, onEditTask, onDeleteTask, onDuplicate, setCreateOpen, search, setSearch, mode }) {
  const { t, lang } = useT();
  const isManager = currentUser === 'Big Boss';
  const canEdit   = (task) => isManager || task.assignee === currentUser || task.createdBy === currentUser;

  const [myOnly,    setMyOnly]    = useState(mode !== 'completed' && !isManager);   // #2: เริ่มต้นเห็นงานตัวเอง
  const [fStatus,   setFStatus]   = useState('');
  const [fAssignee, setFAssignee] = useState('');
  const [fCat,      setFCat]      = useState('');

  const scoped = useMemo(() => myOnly ? tasks.filter(t => t.assignee === currentUser) : tasks, [tasks, myOnly, currentUser]);

  const filtered = useMemo(() => scoped.filter(t => {
    // #4: หน้า "งานทั้งหมด" ซ่อนงานเสร็จแล้ว เฉพาะตอนไม่ได้กรองสถานะ (พอกรองสถานะ = เห็นครบทุกสถานะ)
    if (mode !== 'completed' && !fStatus && t.status === 'done') return false;
    if (fStatus   && t.status   !== fStatus)    return false;
    if (fAssignee && t.assignee !== fAssignee)  return false;
    if (fCat      && t.category !== fCat)       return false;
    if (search    && !(
      t.title.toLowerCase().includes(search.toLowerCase()) ||
      (t.description || '').toLowerCase().includes(search.toLowerCase()) ||
      t.category.toLowerCase().includes(search.toLowerCase()) ||
      t.assignee.toLowerCase().includes(search.toLowerCase())
    )) return false;
    return true;
  }).sort((a, b) => {
    // เรียงตามวันครบกำหนด: ใกล้สุดอยู่บน → ไกลสุดอยู่ล่าง (งานไม่มีกำหนดส่งไปท้ายสุด)
    if (!a.deadline && !b.deadline) return 0;
    if (!a.deadline) return 1;
    if (!b.deadline) return -1;
    return a.deadline.localeCompare(b.deadline);
  }), [scoped, mode, fStatus, fAssignee, fCat, search]);

  function clearFilters() { setFStatus(''); setFAssignee(''); setFCat(''); setSearch(''); }
  const hasFilter = fStatus || fAssignee || fCat || search;
  const headerCount = mode === 'completed' ? scoped.length : scoped.filter(t => t.status !== 'done').length;

  return (
    <div>
      <div className="page-header" style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
        <div>
          <div className="page-title">{mode === 'completed' ? t('completed_title') : t('tasklist_title')}</div>
          <div className="page-subtitle">{mode === 'completed' ? t('completed_sub', { n: headerCount }) : t('tasklist_sub_mgr', { n: headerCount })}</div>
        </div>
        {mode !== 'completed' && (
          <button className="btn btn-primary" style={{ marginTop:4 }} onClick={() => setCreateOpen(true)}>+ {isManager ? t('create_task') : t('create_my_task')}</button>
        )}
      </div>

      <div className="filter-bar">
        {search && (
          <span className="search-chip">
            🔍 “{search}”
            <button onClick={() => setSearch('')} title={t('clear_search')}>✕</button>
          </span>
        )}
        {mode !== 'completed' && (
          <button className={'filter-toggle' + (myOnly ? ' active' : '')}
                  onClick={() => setMyOnly(m => { const nv = !m; if (nv) setFAssignee(''); return nv; })}>
            {myOnly ? '👤 ' + t('scope_mine') : '👥 ' + t('scope_all')} ⇄
          </button>
        )}
        <select className="filter-select" value={fStatus} onChange={e => setFStatus(e.target.value)}>
          <option value="">{t('filter_all_status')}</option>
          {STATUSES.map(s => <option key={s} value={s}>{tStatus(s, lang)}</option>)}
        </select>
        {!myOnly && (
          <select className="filter-select" value={fAssignee} onChange={e => setFAssignee(e.target.value)}>
            <option value="">{t('filter_all_assignee')}</option>
            {ASSIGNEES.map(a => <option key={a} value={a}>{a}</option>)}
          </select>
        )}
        <select className="filter-select" value={fCat} onChange={e => setFCat(e.target.value)}>
          <option value="">{t('filter_all_cat')}</option>
          {CATEGORIES.map(c => <option key={c} value={c}>{tCat(c, lang)}</option>)}
        </select>
        {hasFilter && (
          <button className="btn btn-outline" style={{ fontSize:'0.8rem', padding:'7px 12px' }} onClick={clearFilters}>{t('clear_filters')}</button>
        )}
        <span style={{ marginLeft:'auto', fontSize:'0.82rem', color:'var(--text-muted)' }}>{t('found_n', { n: filtered.length })}</span>
      </div>

      <div className="card">
        {filtered.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon">📭</div>
            <div className="empty-text">{t('no_match')}</div>
          </div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>{t('th_title')}</th>
                  <th>{t('th_assignee')}</th>
                  <th>{t('th_category')}</th>
                  <th>{t('th_status')}</th>
                  <th>{t('th_priority')}</th>
                  <th>{t('th_deadline')}</th>
                  <th>{t('th_timeleft')}</th>
                  <th>{t('th_manage')}</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(task => (
                  <tr key={task.id} className={rowClass(task.deadline, task.status)} style={{ borderLeft: '4px solid ' + getUserColor(task.assignee) }}>
                    <td style={{ maxWidth:220, fontWeight:500, cursor:'pointer' }} onClick={() => onSelectTask(task)}>
                      {task.recurrence && task.recurrence !== 'none' && <span title={t('recur_badge')} style={{ marginRight:4 }}>{task.recurrence.indexOf('tax:') === 0 ? '📅' : '🔁'}</span>}
                      {task.title}
                    </td>
                    <td>
                      <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                        <Avatar name={task.assignee} size="sm" />
                        <span style={{ fontSize:'0.85rem' }}>{task.assignee}</span>
                      </div>
                    </td>
                    <td><span style={{ fontSize:'0.8rem', color:'var(--text-muted)' }}>{tCat(task.category, lang)}</span></td>
                    <td><StatusBadge status={task.status} /></td>
                    <td><PriorityBadge priority={task.priority} /></td>
                    <td style={{ fontSize:'0.85rem' }}>{formatDate(task.deadline, lang)}</td>
                    <td><Countdown deadline={task.deadline} status={task.status} /></td>
                    <td style={{ whiteSpace:'nowrap' }}>
                      <button className="btn-icon" title={t('view_detail')} onClick={() => onSelectTask(task)}>👁️</button>
                      {onDuplicate && <button className="btn-icon" title={t('duplicate')} onClick={e => { e.stopPropagation(); onDuplicate(task); }}>📋</button>}
                      {canEdit(task) && <>
                        <button className="btn-icon" title={t('edit')} onClick={e => { e.stopPropagation(); onEditTask(task); }}>✏️</button>
                        <button className="btn-icon danger" title={t('delete')} onClick={e => { e.stopPropagation(); onDeleteTask(task); }}>🗑️</button>
                      </>}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── TimelineView ─────────────────────────────────────────────────────────────

function TimelineView({ tasks, currentUser, onSelectTask }) {
  const { t, lang } = useT();
  const [year,  setYear]  = useState(2026);
  const [month, setMonth] = useState(5); // 0-indexed June

  function prevMonth() { if (month === 0) { setYear(y => y-1); setMonth(11); } else setMonth(m => m-1); }
  function nextMonth() { if (month === 11) { setYear(y => y+1); setMonth(0); } else setMonth(m => m+1); }

  const DAY_HEADERS = lang === 'en' ? ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'] : ['จ','อ','พ','พฤ','ศ','ส','อา'];

  const isManager    = currentUser === 'Big Boss';
  const visibleTasks = tasks;   // เห็นงานทั้งทีม (pill ระบายสีแยกคน + มี legend อยู่แล้ว)

  const firstDay  = new Date(year, month, 1);
  const lastDay   = new Date(year, month + 1, 0);
  const startDow  = firstDay.getDay(); // 0=Sun
  const offset    = startDow === 0 ? 6 : startDow - 1; // Mon start
  const totalCell = Math.ceil((offset + lastDay.getDate()) / 7) * 7;

  const cells = Array.from({ length: totalCell }, (_, i) => {
    const dn = i - offset + 1;
    if (dn < 1 || dn > lastDay.getDate()) return { dn: null, ds: null };
    const mm = String(month + 1).padStart(2, '0');
    const dd = String(dn).padStart(2, '0');
    return { dn, ds: `${year}-${mm}-${dd}` };
  });

  return (
    <div>
      <div className="page-header">
        <div className="page-title">{t('timeline_title')}</div>
        <div className="page-subtitle">{t('timeline_sub')}</div>
      </div>

      <div className="cal-header">
        <button className="cal-nav-btn" onClick={prevMonth}>{t('prev')}</button>
        <div className="cal-month-label">{lang === 'en' ? `${MONTH_EN[month]} ${year}` : `${MONTH_TH[month]} ${year + 543}`}</div>
        <button className="cal-nav-btn" onClick={nextMonth}>{t('next')}</button>
      </div>

      <div className="cal-grid-wrap">
        <div className="cal-day-headers">
          {DAY_HEADERS.map((h, idx) => <div key={h} className={'cal-day-header' + (idx >= 5 ? ' weekend-header' : '')}>{h}</div>)}
        </div>
        <div className="cal-days">
          {cells.map((cell, i) => {
            const isToday   = cell.ds === TODAY;
            const holiday   = cell.ds ? THAI_HOLIDAY_NAMES[cell.ds] : null;
            const dow       = cell.ds ? new Date(cell.ds + 'T00:00:00').getDay() : -1;
            const isWeekend = dow === 0 || dow === 6;   // อาทิตย์/เสาร์ — ออฟฟิศหยุด
            const dayTasks  = cell.ds ? visibleTasks.filter(t => t.deadline === cell.ds) : [];
            return (
              <div key={i} className={`cal-cell${!cell.dn ? ' other-month' : ''}${isToday ? ' today-cell' : ''}${holiday ? ' holiday-cell' : ''}${isWeekend && !holiday ? ' weekend-cell' : ''}`}>
                {cell.dn && (
                  <>
                    <div className="cal-date-num">{cell.dn}</div>
                    {holiday && <div className="cal-holiday" title={holiday}>🏖️ {holiday}</div>}
                    {dayTasks.map(t => (
                      <span
                        key={t.id}

// D2: ตรวจว่าข้อความเป็นคำสั่ง "ค้นหาไฟล์ใน Drive" ไหม → คืนคำค้น (ถ้าใช่)
function cleanDriveQ(x) {
  let q = (x || '').trim()
    .replace(/\s*(ให้(หน่อย|ที|ด้วย)?|หน่อย(ครับ|ค่ะ)?|ที|ด้วย|ครับ|ค่ะ|คะ)\s*$/g, '')
    .replace(/\s*ใน\s*(?:ไดร์ฟ|ไดรฟ์|ไดร์ว|ไดร์|ไดรว์|ไดร|drive).*$/i, '')
    .replace(/^(ชื่อ|ไฟล์ชื่อ|ไฟล์)\s*/, '')
    .trim();
  return q.length >= 2 ? q : null;
}
function detectDriveSearch(text) {
  let s = (text || '').trim().replace(/[?？！.]+$/, '').trim();
  if (!s) return null;
  let m;
  // นำหน้า: (ช่วย)(ค้นหา|ค้น|หา)(ไฟล์|เอกสาร) X
  m = s.match(/^(?:ช่วย\s*)?(?:ค้นหา|ค้น|หา)\s*(?:ไฟล์|เอกสาร)\s+(.+)$/i);
  if (m) return cleanDriveQ(m[1]);
  // หาใน(ไดรฟ์/drive) X
  m = s.match(/^(?:ช่วย\s*)?(?:ค้นหา|ค้น|หา)\s*(?:ใน)?\s*(?:ไดร์ฟ|ไดรฟ์|ไดร์ว|ไดร์|ไดรว์|ไดร|drive)\s+(.+)$/i);
  if (m) return cleanDriveQ(m[1]);
  // ลงท้าย: X อยู่ไหน / X อยู่โฟลเดอร์ไหน
  m = s.match(/^(?:ไฟล์|เอกสาร)?\s*(.+?)\s*อยู่(?:ที่ไหน|โฟลเดอร์ไหน|ตรงไหน|ไหน)$/i);
  if (m) return cleanDriveQ(m[1]);
  // English: find/search file|document X ; find X in drive
  m = s.match(/^(?:find|search)\s+(?:for\s+)?(?:a\s+|the\s+)?(?:file|document|doc)\s+(?:named\s+|called\s+)?(.+)$/i);
  if (m) return cleanDriveQ(m[1]);
  m = s.match(/^(?:find|search)\s+(.+?)\s+in\s+(?:the\s+)?drive$/i);
  if (m) return cleanDriveQ(m[1]);
  m = s.match(/^where(?:'s| is| are)\s+(?:the\s+)?(?:file\s+)?(.+)$/i);
  if (m) return cleanDriveQ(m[1]);
  // กว้างขึ้น: "หา X / ค้น X / ค้นหา X" (ไม่มีคำว่าไฟล์ก็ได้) — เว้นพวกคำถามเชิงอธิบาย
  const NON_FILE = /(วิธี|ยังไง|อย่างไร|ทำไม|เท่าไหร่|เท่าไร|กี่|อะไร|คือ|แปลว่า|หมายถึง|ไหม|หรือไม่|ขั้นตอน|สูตร|ข้อมูล|ความหมาย|how|why|what|when|explain)/i;
  m = s.match(/^(?:ช่วย\s*)?(?:ค้นหา|ค้น|หา)\s*(.+)$/i);
  if (m && !NON_FILE.test(m[1])) return cleanDriveQ(m[1]);
  return null;
}
