# ============================================================================
# AFFlow — Supabase keep-alive
# ยิง Supabase REST ทุกวัน เพื่อกัน project (free tier) ถูก pause เองหลังไม่ใช้ 7 วัน
# รันบนเซิร์ฟเวอร์ GitHub ฟรี — ไม่ต้องเปิดคอมทิ้งไว้
# หมายเหตุ: apikey ด้านล่างเป็น "anon public key" (เปิดเผยได้ ฝังอยู่ใน index.html อยู่แล้ว)
# ============================================================================
name: Supabase keep-alive

on:
  schedule:
    - cron: '17 3 * * *'      # ทุกวัน 03:17 UTC (~10:17 น. ไทย)
  workflow_dispatch: {}         # กดรันเองได้จากแท็บ Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhZG9yanVwcmZ4dmx1Z3hzenNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzOTM4NTEsImV4cCI6MjA5NTk2OTg1MX0.n0ENm64sdxUYQyIWZqTDOeChLzvou8_QFZzY6L0z3a0"
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://dadorjuprfxvlugxszsh.supabase.co/rest/v1/tasks?select=id&limit=1" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY")
          echo "Supabase REST → HTTP $CODE ($(date -u))"
          if [ "$CODE" = "000" ] || [ "$CODE" -ge 500 ]; then
            echo "::error::Supabase ping failed (HTTP $CODE)"; exit 1
          fi
          echo "✓ keep-alive สำเร็จ — project จะไม่ pause"
